: "A", "explanation_en": "Option A is the correct solution because it satisfies authentication, private connectivity, fine-grained authorization, and auditing using AWS-recommended patterns.\n\nSAML federation between Microsoft Entra ID and IAM is a mature, well-supported integration that enables centralized enterprise authentication. Department-specific IAM roles allow precise control over which Bedrock ModelId values each department can invoke, enforcing access by model family.\n\nUsing AWS PrivateLink interface VPC endpoints for Amazon Bedrock runtime services ensures that all inference traffic stays on private AWS network paths, with no public internet exposure. NAT gateways and public endpoints, as used in other options, violate this requirement.\n\nAWS CloudTrail provides authoritative audit logs of all Bedrock API calls, which is required for compliance. Amazon Bedrock model invocation logging complements CloudTrail by capturing detailed prompt and response metadata for deeper auditing and investigation.\n\nOption B uses public endpoints via NAT. Option C incorrectly claims public endpoints can be private. Option D relies on IdP-side logs, which do not capture Bedrock API activity.\n\nTherefore, Option A is the only solution that fully meets security, compliance, and observability requirements.", "source": "116-117"}, {"id": "q0021", "question": "A healthcare company is using Amazon Bedrock to build a Retrieval Augmented Generation (RAG) application that helps practitioners make clinical decisions. The application must achieve high accuracy for patient information retrievals, identify hallucinations in generated content, and reduce human review costs.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Use Amazon Comprehend to analyze and classify RAG responses and to extract medical entities and relationships. Use AWS Step Functions to orchestrate automated evaluations. Configure Amazon CloudWatch metrics to track entity recognition confidence scores. Configure CloudWatch to send an alert when accuracy falls below specified thresholds."}, {"key": "B", "text": "Implement automated large language model (LLM)-based evaluations that use a specialized model that is fine-tuned for medical content to assess all responses. Deploy AWS Lambda functions to parallelize evaluations. Publish results to Amazon CloudWatch metrics that track relevance and factual accuracy."}, {"key": "C", "text": "Configure Amazon CloudWatch Synthetics to generate test queries that have known answers on a regular schedule, and track model success rates. Set up dashboards that compare synthetic test results against expected outcomes."}, {"key": "D", "text": "Deploy a hybrid evaluation system that uses an automated LLM-as-a-judge evaluation to initially screen responses and targeted human reviews for edge cases. Use a built-in Amazon Bedrock evaluation to track retrieval precision and hallucination rates."}], "answers": ["D"], "answer_display": "D", "explanation_en": "Option D is the correct solution because it directly addresses all three requirements: high retrieval accuracy, hallucination detection, and reduced human review costs. AWS recommends a layered evaluation strategy for high-stakes domains such as healthcare, where generative outputs must be both accurate and safe.\n\nUsing an automated LLM-as-a-judge evaluation enables scalable, consistent assessment of generated responses for factual grounding, relevance, and hallucination risk. This automated screening significantly reduces the number of responses that require manual inspection. Only responses that fall below defined quality thresholds or exhibit ambiguous behavior are escalated to targeted human reviews, which optimizes review effort and cost.\n\nThe use of Amazon Bedrock built-in evaluations provides standardized metrics specifically designed for RAG systems, including retrieval precision, faithfulness to source documents, and hallucination rates. These evaluations integrate directly with Amazon Bedrock knowledge bases and models, eliminating the need to build and maintain custom evaluation pipelines.\n\nOption A focuses on entity extraction confidence, which does not reliably detect hallucinations in generative text. Option B requires maintaining and scaling a separate fine-tuned evaluation model, increasing complexity and cost. Option C is useful for regression testing but cannot detect hallucinations in real-world, open-ended clinical queries.\n\nTherefore, Option D provides the most effective and operationally efficient approach to maintaining clinical-grade accuracy while minimizing human review effort.", "source": "117-118"}, {"id": "q0022", "question": "A company is using Amazon Bedrock to develop an Al-powered application that uses a foundation model (FM) that supports cross-Region inference and provisioned throughput. The application must serve users in Europe and North America with consistently low latency. The application must comply with data residency regulations that require European user data to remain within Europe-based AWS Regions.\n\nDuring testing, the application experiences service degradation when Regional traffic spikes reach service quotas. The company needs a solution that maintains application resilience and minimizes operational complexity.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Deploy separate Amazon Bedrock instances in North American and European Regions. Use a custom routing layer that directs traffic based on user location. Configure Amazon CloudWatch alarms to monitor Regional service usage. Use Amazon SNS to send email alerts when usage approaches thresholds."}, {"key": "B", "text": "Use Amazon Bedrock cross-Region inference profiles by specifying geographical codes in profile IDs when calling the InvokeModel API. Configure separate Amazon API Gateway HTTP APIs to direct European and North American users to the appropriate Regional endpoints."}, {"key": "C", "text": "Deploy a multi-Region Amazon API Gateway HTTP API and AWS Lambda functions that implement retry logic to handle throttling. Configure the Lambda functions to call the FM in the nearest secondary Region when quotas are reached."}, {"key": "D", "text": "Configure provisioned throughput for Amazon Bedrock in multiple Regions. Implement failover logic in application code to switch Regions when throttling occurs. Use AWS Global Accelerator to route traffic based on user location."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B is the most appropriate solution because it directly uses Amazon Bedrock cross-Region inference profiles, which are designed to provide resilience and load distribution while respecting data residency boundaries. Cross-Region inference profiles allow applications to distribute inference requests across multiple Regions within a defined geographic boundary, such as Europe or North America, without requiring custom failover logic.\n\nBy specifying geographical codes in the inference profile ID, the application ensures that European user data is processed only within Europe-based Regions, satisfying regulatory requirements. At the same time, Bedrock automatically routes requests to healthy Regions within that geography when traffic spikes or service quotas are reached, improving availability and maintaining low latency.\n\nUsing separate Amazon API Gateway HTTP APIs for Europe and North America provides a clean, simple routing layer that directs users to the appropriate regional inference profile. This avoids complex custom routing or retry logic in application code and minimizes operational overhead.\n\nOption A relies on custom routing and manual monitoring, which increases complexity and does not provide automatic resilience. Option C introduces custom retry and fallback logic that risks violating data residency requirements if misconfigured. Option D requires significant application-level failover logic and adds operational burden with Global Accelerator configuration.\n\nTherefore, Option B best meets the requirements for low latency, data residency compliance, resilience during traffic spikes, and minimal operational complexity.", "source": "119-120"}, {"id": "q0023", "question": "A financial services company is developing a Retrieval Augmented Generation (RAG) application to help investment analysts query complex financial relationships across multiple investment vehicles, market sectors, and regulatory environments. The dataset contains highly interconnected entities that have multi-hop relationships. Analysts must examine relationships holistically to provide accurate investment guidance. The application must deliver comprehensive answers that capture indirect relationships between financial entities and must respond in less than 3 seconds.\n\nWhich solution will meet these requirements with the LEAST operational overhead?", "question_type": "single", "options": [{"key": "A", "text": "Use Amazon Bedrock Knowledge Bases with GraphRAG and Amazon Neptune Analytics to store financial data. Analyze multi-hop relationships between entities and automatically identify related information across documents."}, {"key": "B", "text": "Use Amazon Bedrock Knowledge Bases and an Amazon OpenSearch Service vector store to implement custom relationship identification logic that uses AWS Lambda to query multiple vector embeddings in sequence."}, {"key": "C", "text": "Use Amazon OpenSearch Serverless vector search with k-nearest neighbor (k-NN). Implement manual relationship mapping in an application layer that runs on Amazon EC2 Auto Scaling."}, {"key": "D", "text": "Use Amazon DynamoDB to store financial data in a custom indexing system. Use AWS Lambda to query relevant records. Use Amazon SageMaker to generate responses."}], "answers": ["A"], "answer_display": "A", "explanation_en": "Option A best satisfies the requirement to capture multi-hop, highly interconnected relationships with minimal operational overhead. Traditional vector similarity search excels at finding semantically similar text but is not optimized for reasoning over explicit entity-to-entity relationships, especially when analysts need indirect, multi-hop connections (for example, fund # holding # issuer # sector # regulation). Graph-based retrieval is designed specifically for these kinds of relationship traversals.\n\nGraphRAG combines retrieval-augmented generation with graph-aware context selection. By representing entities and their relationships in a graph store, the system can traverse multiple hops to assemble a holistic set of relevant facts. This improves completeness and reduces the chance that the model misses indirect relationships that are essential for accurate investment guidance.\n\nAmazon Neptune Analytics provides a managed graph analytics environment capable of efficiently traversing and analyzing complex relationship networks. When integrated with Amazon Bedrock Knowledge Bases, it reduces custom engineering by providing managed ingestion, retrieval, and orchestration patterns suitable for GenAI applications. This lowers operational overhead compared to building and maintaining custom multi-stage retrieval logic.\n\nMeeting the sub-3-second requirement is also more feasible with a graph-optimized engine because multi-hop traversals can be executed efficiently compared to chaining multiple vector searches and joining results in an application layer. The managed nature of Knowledge Bases and Neptune Analytics reduces maintenance, scaling, and operational burden while enabling strong performance.\n\nOption B and C require extensive custom logic and orchestration, increasing complexity and latency. Option D is not designed for graph-style multi-hop exploration and would require significant custom indexing and retrieval logic.\n\nTherefore, Option A is the most AWS-aligned and operationally efficient approach for multi-hop relationship-aware RAG with strong performance.", "source": "120-121"}, {"id": "q0024", "question": "A company is implementing a serverless inference API by using AWS Lambda. The API will dynamically invoke multiple Al models hosted on Amazon Bedrock. The company needs to design a solution that can switch between model providers without modifying or redeploying Lambda code in real time. The design must include safe rollout of configuration changes and validation and rollback capabilities.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Store the active model provider in AWS Systems Manager Parameter Store. Configure a Lambda function to read the parameter at runtime to determine which model to invoke."}, {"key": "B", "text": "Store the active model provider in AWS AppConfig. Configure a Lambda function to read the configuration at runtime to determine which model to invoke."}, {"key": "C", "text": "Configure an Amazon API Gateway REST API to route requests to separate Lambda functions. Hardcode each Lambda function to a specific model provider. Switch the integration target manually."}, {"key": "D", "text": "Store the active model provider in a JSON file hosted on Amazon S3. Use AWS AppConfig to reference the S3 file as a hosted configuration source. Configure a Lambda function to read the file through AppConfig at runtime to determine which model to invoke."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B is the correct solution because AWS AppConfig is specifically designed to support dynamic configuration management with safe rollout, validation, and rollback, which are explicit requirements in the scenario.\n\nBy storing the active model provider configuration in AWS AppConfig, the company can switch between Amazon Bedrock model providers in real time without redeploying Lambda code. AppConfig supports deployment strategies such as canary releases, linear rollouts, and immediate deployments, allowing safe and controlled changes. If a configuration causes issues, AppConfig supports automatic rollback, reducing operational risk.\n\nAWS AppConfig also supports schema validation, ensuring that configuration values such as model identifiers, provider names, or inference parameters are valid before being applied. This prevents misconfiguration from impacting production workloads.\n\nOption A uses Parameter Store, which lacks native rollout strategies, validation, and automated rollback, making it unsuitable for safe real-time switching. Option C requires manual routing changes and code coupling, increasing operational overhead and deployment risk. Option D introduces unnecessary complexity by hosting configuration files in Amazon S3 when AppConfig already supports native hosted configurations.\n\nTherefore, Option B provides the most robust, scalable, and low-maintenance solution for dynamic model switching in a serverless Amazon Bedrock inference architecture.", "source": "121-122"}, {"id": "q0025", "question": "A publishing company is developing a chat assistant that uses a containerized large language model (LLM) that runs on Amazon SageMaker AI. The architecture consists of an Amazon API Gateway REST API that routes user requests to an AWS Lambda function. The Lambda function invokes a SageMaker Al real-time endpoint that hosts the LLM.\n\nUsers report uneven response times. Analytics show that a high number of chats are abandoned after 2 seconds of waiting for the first token. The company wants a solution to ensure that p95 latency is under 800 ms for interactive requests to the chat assistant.\n\nWhich combination of solutions will meet this requirement? (Select TWO.)", "question_type": "multiple", "options": [{"key": "A", "text": "Enable model preload upon container startup. Implement dynamic batching to process multiple user requests together in a single inference pass."}, {"key": "B", "text": "Select a larger GPU instance type for the SageMaker Al endpoint. Set the minimum number of instances to 0. Continue to perform per-request processing. Lazily load model weights on the first request."}, {"key": "C", "text": "Switch to a multi-model endpoint. Use lazy loading without request batching."}, {"key": "D", "text": "Set the minimum number of instances to greater than 0. Enable response streaming."}, {"key": "E", "text": "Switch to Amazon SageMaker Asynchronous Inference for all requests. Store requests in an Amazon S3 bucket. Set the minimum number of instances to 0."}], "answers": ["A", "D"], "answer_display": "AD", "explanation_en": "The correct answers are A and D because they directly reduce time-to-first-token and stabilize p95 latency for interactive, real-time chat workloads hosted on Amazon SageMaker Al real-time endpoints.\n\nOption D addresses the biggest driver of uneven latency: cold starts and scale-to-zero behavior. By setting the minimum number of instances to greater than 0, the endpoint always has warm capacity and loaded runtime resources, eliminating the first-request penalty that causes users to wait multiple seconds. Enabling response streaming improves perceived latency by returning the first tokens as soon as they are generated rather than waiting for the complete response. This directly targets the abandonment problem described (users leaving after waiting for the first token).\n\nOption A further improves p95 latency and throughput by removing model loading overhead during inference and improving GPU utilization. Preloading model weights during container startup ensures the model is ready before traffic arrives and avoids unpredictable on-demand weight loading. Dynamic batching increases efficiency by grouping compatible requests into a single inference pass, reducing per-request overhead and improving GPU saturation. When tuned properly for interactive workloads, batching can reduce tail latency while preserving responsiveness by enforcing small batch windows.\n\nOption B makes latency worse because setting minimum instances to 0 and lazily loading weights guarantees cold-start delays and unpredictable first-token performance. Option C similarly increases cold-start behavior through lazy loading and offers no batching benefits. Option E is designed for non-interactive workloads and introduces queueing and storage latency, which conflicts with the 800 ms p95 requirement for interactive chat.\n\nTherefore, A and D are the best combination to achieve consistently low p95 latency and fast first-token streaming for a SageMaker-hosted chat assistant.", "source": "122-123"}, {"id": "q0026", "question": "A company has a recommendation system. The system's applications run on Amazon EC2 instances. The applications make API calls to Amazon Bedrock foundation models (FMs) to analyze customer behavior and generate personalized product recommendations.\n\nThe system is experiencing intermittent issues. Some recommendations do not match customer preferences. The company needs an observability solution to monitor operational metrics and detect patterns of operational performance degradation compared to established baselines. The solution must also generate alerts with correlation data within 10 minutes when FM behavior deviates from expected patterns.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Configure Amazon CloudWatch Container Insights for the application infrastructure. Set up CloudWatch alarms for latency thresholds. Add custom metrics for token counts by using the CloudWatch embedded metric format. Create CloudWatch dashboards to visualize the data."}, {"key": "B", "text": "Implement AWS X-Ray to trace requests through the application components. Enable CloudWatch Logs Insights for error pattern detection. Set up AWS CloudTrail to monitor all API calls to Amazon Bedrock. Create custom dashboards in Amazon QuickSight."}, {"key": "C", "text": "Enable Amazon CloudWatch Application Insights for the application resources. Create custom metrics for recommendation quality, token usage, and response latency by using the CloudWatch embedded metric format with dimensions for request types and user segments. Configure CloudWatch anomaly detection on the model metrics. Establish log pattern analysis by using CloudWatch Logs Insights."}, {"key": "D", "text": "Use Amazon OpenSearch Service with the Observability plugin. Ingest model metrics and logs by using Amazon Kinesis. Create custom Piped Processing Language (PPL) queries to analyze model behavior patterns. Establish operational dashboards to visualize anomalies in real time."}], "answers": ["C"], "answer_display": "C", "explanation_en": "Option C best satisfies the requirements because it combines application-aware observability, metric baselining, anomaly detection, and correlated alerting using fully managed AWS services with minimal operational overhead. Amazon CloudWatch Application Insights is designed to automatically monitor application health by analyzing metrics, logs, and events across EC2-based workloads. This aligns directly with the need to detect intermittent performance issues and deviations from expected behavior.\n\nBy publishing custom metrics using the CloudWatch embedded metric format, the application can track generative Al-specific signals such as recommendation quality indicators, token usage, request volume, and response latency from Amazon Bedrock foundation model calls. Adding dimensions such as request type or user segment enables fine-grained visibility into which workloads or customer groups are impacted when recommendation quality degrades.\n\nA critical requirement is detecting degradation compared to established baselines and generating alerts within 10 minutes. CloudWatch anomaly detection automatically builds statistical models of normal behavior for time-series metrics and flags deviations without requiring manually tuned thresholds. This capability is well suited for monitoring foundation model behavior, which can vary subtly over time. When anomalies are detected, CloudWatch alarms can trigger notifications with contextual metric data quickly, meeting the alerting requirement.\n\nCloudWatch Logs Insights complements the metric-based view by enabling log pattern analysis and correlation. Engineers can query application logs and model response logs to identify recurring error patterns or shifts in output behavior that explain why recommendations no longer align with user preferences. Application Insights further correlates metrics and logs to surface probable root causes, reducing mean time to resolution.\n\nThe other options lack one or more critical elements. Option A focuses on infrastructure-level metrics without baseline anomaly detection. Option B emphasizes tracing and auditing but does not provide automated performance deviation analysis. Option D offers flexibility but requires significantly more development and operational effort than a native CloudWatch-based solution.", "source": "124-125"}]</script>
  <script>
    const QUESTIONS = JSON.parse(document.getElementById('quiz-data').textContent);

    const STORAGE_KEY = 'aip_quiz_pc_add26_v1';
    const PROGRESS_KEY = 'aip_quiz_mobile_progress_dedup84_v1';
    const QUESTIONS_SIGNATURE = `${QUESTIONS.length}:${QUESTIONS[0]?.id || ''}:${QUESTIONS[QUESTIONS.length - 1]?.id || ''}`;

    const state = {
      mode: 'all',
      order: [],
      index: 0,
      submitted: false,
      session: { answered: 0, correct: 0, wrong: 0 },
      stats: loadStats(),
      currentSelection: new Set(),
      restored: false,
    };

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function loadStats() {
      const empty = { byId: {}, wrongBook: [] };
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return empty;
        const parsed = JSON.parse(raw);
        if (!parsed.byId) parsed.byId = {};
        if (!Array.isArray(parsed.wrongBook)) parsed.wrongBook = [];
        return parsed;
      } catch {
        return empty;
      }
    }

    function saveStats() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.stats));
    }

    function saveProgress() {
      const payload = {
        signature: QUESTIONS_SIGNATURE,
        mode: state.mode,
        order: state.order,
        index: state.index,
        submitted: state.submitted,
        session: state.session,
        currentSelection: [...state.currentSelection],
        savedAt: new Date().toISOString(),
      };
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(payload));
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(PROGRESS_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (parsed.signature !== QUESTIONS_SIGNATURE) return null;
        if (!Array.isArray(parsed.order) || !parsed.order.length) return null;
        if (typeof parsed.index !== 'number') return null;
        if (!parsed.session || typeof parsed.session.answered !== 'number') return null;
        return parsed;
      } catch {
        return null;
      }
    }

    function clearProgressStorage() {
      localStorage.removeItem(PROGRESS_KEY);
    }

    function applyProgress(progress) {
      state.mode = progress.mode === 'wrong' ? 'wrong' : 'all';
      state.order = progress.order.filter(id => QUESTIONS.some(q => q.id === id));
      state.index = Math.min(Math.max(progress.index || 0, 0), Math.max(state.order.length - 1, 0));
      state.submitted = Boolean(progress.submitted);
      state.session = {
        answered: Number(progress.session?.answered || 0),
        correct: Number(progress.session?.correct || 0),
        wrong: Number(progress.session?.wrong || 0),
      };
      state.currentSelection = new Set(Array.isArray(progress.currentSelection) ? progress.currentSelection : []);
      state.restored = true;
    }

    function resetCurrentProgress() {
      if (!confirm('确定重置当前本轮进度并重新开始吗？')) return;
      buildOrder();
      render();
    }

    function getQuestionById(id) {
      return QUESTIONS.find(q => q.id === id);
    }

    function buildOrder() {
      let pool = [];
      if (state.mode === 'wrong') {
        pool = state.stats.wrongBook
          .map(getQuestionById)
          .filter(Boolean);
      } else {
        pool = [...QUESTIONS];
      }
      state.order = shuffle(pool.map(q => q.id));
      state.index = 0;
      state.submitted = false;
      state.currentSelection = new Set();
      state.session = { answered: 0, correct: 0, wrong: 0 };
      state.restored = false;
      saveProgress();
    }

    function currentQuestion() {
      const id = state.order[state.index];
      return getQuestionById(id);
    }

    function setMode(mode) {
      state.mode = mode;
      buildOrder();
      render();
    }

    function updateTopStats() {
      document.getElementById('statTotal').textContent = QUESTIONS.length;
      document.getElementById('statProgress').textContent = `${state.session.answered} / ${state.order.length}`;
      const acc = state.session.answered ? Math.round(state.session.correct / state.session.answered * 100) : 0;
      document.getElementById('statAccuracy').textContent = `${acc}%`;
      document.getElementById('statWrongBook').textContent = state.stats.wrongBook.length;
      document.getElementById('modePill').textContent = `当前模式：${state.mode === 'all' ? '随机全量' : '错题本'}`;
      document.getElementById('resumePill').textContent = state.restored ? '进度：已恢复上次位置' : '进度：自动保存中';
      document.getElementById('modeAllBtn').classList.toggle('mode-active', state.mode === 'all');
      document.getElementById('modeWrongBtn').classList.toggle('mode-active', state.mode === 'wrong');
      const total = state.order.length || 1;
      const percent = Math.round((state.session.answered / total) * 100);
      document.getElementById('progressFill').style.width = `${percent}%`;
    }

    function toggleSelection(key) {
      const q = currentQuestion();
      if (!q || state.submitted) return;

      if (q.question_type === 'single') {
        state.currentSelection = new Set([key]);
      } else {
        if (state.currentSelection.has(key)) state.currentSelection.delete(key);
        else state.currentSelection.add(key);
      }
      saveProgress();
      render();
    }

    function arrayEqualAsSet(a, b) {
      if (a.length !== b.length) return false;
      const sa = new Set(a);
      const sb = new Set(b);
      if (sa.size !== sb.size) return false;
      for (const x of sa) if (!sb.has(x)) return false;
      return true;
    }

    function recordResult(q, userAnswers, isCorrect) {
      const byId = state.stats.byId;
      if (!byId[q.id]) {
        byId[q.id] = { shown: 0, correct: 0, wrong: 0, last_user_answer: [] };
      }
      byId[q.id].shown += 1;
      byId[q.id].last_user_answer = userAnswers;
      if (isCorrect) byId[q.id].correct += 1;
      else byId[q.id].wrong += 1;

      const wrongSet = new Set(state.stats.wrongBook);
      if (isCorrect) wrongSet.delete(q.id);
      else wrongSet.add(q.id);
      state.stats.wrongBook = [...wrongSet];
      saveStats();
    }

    function submitAnswer() {
      const q = currentQuestion();
      if (!q || state.submitted) return;
      const userAnswers = [...state.currentSelection].sort();
      if (!userAnswers.length) {
        alert('请先选择答案。');
        return;
      }
      const correctAnswers = [...q.answers].sort();
      const isCorrect = arrayEqualAsSet(userAnswers, correctAnswers);
      state.submitted = true;
      state.session.answered += 1;
      if (isCorrect) state.session.correct += 1;
      else state.session.wrong += 1;
      recordResult(q, userAnswers, isCorrect);
      saveProgress();
      render();
    }

    function nextQuestion() {
      if (state.index < state.order.length - 1) {
        state.index += 1;
        state.submitted = false;
        state.currentSelection = new Set();
      } else {
        state.submitted = false;
        state.currentSelection = new Set();
      }
      state.restored = false;
      saveProgress();
      render();
    }

    function resetStats() {
      if (!confirm('确定清空本地统计、错题本和断点进度吗？')) return;
      localStorage.removeItem(STORAGE_KEY);
      clearProgressStorage();
      state.stats = loadStats();
      buildOrder();
      render();
    }

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function renderQuestion() {
      const wrap = document.getElementById('questionWrap');
      updateTopStats();

      if (!state.order.length) {
        wrap.innerHTML = `<div class="empty">${state.mode === 'wrong' ? '错题本目前为空。先去随机全量模式做题。' : '没有可用题目。'}</div>`;
        return;
      }

      const q = currentQuestion();
      if (!q) {
        wrap.innerHTML = `<div class="empty">本轮已结束。你可以重新洗牌，或者切换模式继续刷题。</div>`;
        return;
      }

      const selected = state.currentSelection;
      const inputType = q.question_type === 'single' ? 'radio' : 'checkbox';
      const currentNo = Math.min(state.index + 1, state.order.length);
      const optionsHtml = q.options.map(opt => {
        const isSelected = selected.has(opt.key);
        let extraClass = isSelected ? 'selected' : '';

        if (state.submitted) {
          const isCorrectOption = q.answers.includes(opt.key);
          const isWrongSelected = isSelected && !isCorrectOption;
          if (isCorrectOption) extraClass = 'correct';
          if (isWrongSelected) extraClass = 'incorrect';
        }

        return `
          <label class="option ${extraClass}">
            <input type="${inputType}" name="answer" value="${opt.key}" ${isSelected ? 'checked' : ''} ${state.submitted ? 'disabled' : ''} onchange="toggleSelection('${opt.key}')" />
            <div>
              <div class="opt-key">${opt.key}</div>
              <div class="opt-text">${escapeHtml(opt.text)}</div>
            </div>
          </label>`;
      }).join('');

      const userAnswers = [...selected].sort();
      const isCorrect = arrayEqualAsSet(userAnswers, [...q.answers].sort());
      const resultHtml = state.submitted ? `
        <div class="result show">
          <div class="banner ${isCorrect ? 'ok' : 'bad'}">${isCorrect ? '回答正确' : '回答错误'}｜正确答案：${q.answer_display}</div>
          <div class="small">你的答案：${userAnswers.join('') || '未作答'} ｜ 来源页码：${escapeHtml(q.source || '')}</div>
          <div>
            <div class="small" style="margin-bottom:8px;">英文解析</div>
            <div class="explanation">${escapeHtml(q.explanation_en)}</div>
          </div>
        </div>` : '';

      const submitDisabled = state.submitted ? 'disabled' : '';
      const nextLabel = state.index < state.order.length - 1 ? '下一题' : '本轮结束';
      const typeText = q.question_type === 'single' ? '单选题' : '多选题';

      wrap.innerHTML = `
        <div class="meta">
          <span class="pill">第 ${currentNo} / ${state.order.length} 题</span>
          <span class="pill">${typeText}</span>
          <span class="pill">内部编号：${q.id}</span>
        </div>
        <div class="question-text">${escapeHtml(q.question)}</div>
        <div class="options">${optionsHtml}</div>
        ${resultHtml}
        <div class="footer-actions">
          <button class="primary" onclick="submitAnswer()" ${submitDisabled}>提交答案</button>
          <button onclick="nextQuestion()" ${state.submitted ? '' : 'disabled'}>${nextLabel}</button>
        </div>
      `;
    }

    function render() {
      renderQuestion();
    }

    document.getElementById('modeAllBtn').addEventListener('click', () => setMode('all'));
    document.getElementById('modeWrongBtn').addEventListener('click', () => setMode('wrong'));
    document.getElementById('restartBtn').addEventListener('click', () => { buildOrder(); render(); });
    document.getElementById('resetProgressBtn').addEventListener('click', resetCurrentProgress);
    document.getElementById('resetStatsBtn').addEventListener('click', resetStats);

    const savedProgress = loadProgress();
    if (savedProgress) applyProgress(savedProgress);
    else buildOrder();
    render();
    window.addEventListener('beforeunload', saveProgress);

    window.toggleSelection = toggleSelection;
    window.submitAnswer = submitAnswer;
    window.nextQuestion = nextQuestion;
  </script>
</body>
</html>
