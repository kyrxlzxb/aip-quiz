<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS AIP 补抽题库刷题器（26题版）</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a30;
      --panel-2: #18223d;
      --text: #eaf0ff;
      --muted: #9fb0d6;
      --accent: #7aa2ff;
      --ok: #2ecc71;
      --bad: #ff6b6b;
      --warn: #ffd166;
      --border: #26345c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: linear-gradient(180deg, #08101f 0%, #0f1730 100%); color: var(--text); }
    .app { max-width: 980px; margin: 0 auto; padding: 24px 16px 64px; }
    .header { display: grid; gap: 14px; margin-bottom: 18px; }
    .title { font-size: 28px; font-weight: 800; letter-spacing: .2px; }
    .subtitle { color: var(--muted); line-height: 1.5; }
    .topbar { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; }
    .card { background: rgba(18,26,48,.95); border: 1px solid var(--border); border-radius: 18px; padding: 14px 16px; box-shadow: 0 12px 30px rgba(0,0,0,.22); }
    .stat-label { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: 800; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 18px 0; }
    button { appearance: none; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); border-radius: 12px; padding: 10px 14px; font-size: 14px; cursor: pointer; }
    button.primary { background: var(--accent); color: #091223; border-color: transparent; font-weight: 700; }
    button.ghost { background: transparent; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .pill { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(122,162,255,.12); color: #cfe0ff; border: 1px solid rgba(122,162,255,.28); font-size: 13px; }
    .question-card { display: grid; gap: 16px; }
    .meta { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; color: var(--muted); font-size: 13px; }
    .question-text { white-space: pre-wrap; line-height: 1.7; font-size: 17px; }
    .options { display: grid; gap: 12px; }
    label.option { display: grid; grid-template-columns: 28px 1fr; gap: 12px; align-items: start; background: #10182d; border: 1px solid var(--border); border-radius: 16px; padding: 14px; cursor: pointer; }
    label.option.selected { border-color: var(--accent); background: rgba(122,162,255,.1); }
    label.option.correct { border-color: rgba(46,204,113,.65); background: rgba(46,204,113,.12); }
    label.option.incorrect { border-color: rgba(255,107,107,.7); background: rgba(255,107,107,.12); }
    .opt-key { font-weight: 800; color: #cfe0ff; padding-top: 2px; }
    .opt-text { white-space: pre-wrap; line-height: 1.65; color: #edf2ff; }
    input[type="radio"], input[type="checkbox"] { margin-top: 3px; }
    .result { display: none; gap: 12px; margin-top: 8px; }
    .result.show { display: grid; }
    .banner { padding: 14px 16px; border-radius: 14px; font-weight: 700; }
    .banner.ok { background: rgba(46,204,113,.14); border: 1px solid rgba(46,204,113,.45); color: #bdf0cf; }
    .banner.bad { background: rgba(255,107,107,.14); border: 1px solid rgba(255,107,107,.45); color: #ffd4d4; }
    .explanation { white-space: pre-wrap; line-height: 1.7; color: #eef3ff; background: #10182d; border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
    .small { color: var(--muted); font-size: 13px; }
    .footer-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .empty { color: var(--muted); padding: 24px 0; text-align: center; }
    .progressbar { height: 10px; background: #0d1430; border-radius: 999px; overflow: hidden; border: 1px solid var(--border); }
    .progressbar > div { height: 100%; background: linear-gradient(90deg, #7aa2ff 0%, #9fb7ff 100%); width: 0%; transition: width .2s ease; }
    .mode-active { outline: 2px solid rgba(122,162,255,.55); }
    @media (max-width: 760px) { .topbar { grid-template-columns: repeat(2, minmax(0,1fr)); } .title { font-size: 24px; } }
  

    @media (max-width: 900px) {
      body { font-size: 17px; }
      .app { padding: 10px; }
      .topbar, .panel, .card, .question-card { border-radius: 18px !important; }
      .topbar { position: sticky; top: 0; z-index: 30; backdrop-filter: blur(10px); }
      .title { font-size: 1.15rem !important; line-height: 1.3; }
      .subtitle, .muted, .meta, .progress-text { font-size: 0.95rem !important; }
      .toolbar, .actions, .mode-switch, .stats-grid { gap: 10px !important; }
      button, .btn, .chip, .mode-btn { min-height: 48px; padding: 12px 14px !important; font-size: 1rem !important; border-radius: 14px !important; }
      label.option, .option, .choice, .answer-option { padding: 14px 14px !important; min-height: 54px; border-radius: 16px !important; }
      input[type="radio"], input[type="checkbox"] { width: 20px; height: 20px; }
      .question-text { font-size: 1.05rem !important; line-height: 1.65 !important; }
      .explanation, .result-panel { font-size: 0.98rem !important; line-height: 1.65 !important; }
      .stats-grid { grid-template-columns: 1fr 1fr !important; }
      .footer-actions, .bottom-actions { position: sticky; bottom: 0; background: rgba(11,16,32,0.92); padding-top: 8px; }
    }

    @media (max-width: 600px) {
      .app { padding: 8px; }
      .topbar, .panel, .card, .question-card { padding: 14px !important; }
      .stats-grid { grid-template-columns: 1fr !important; }
      .toolbar, .actions, .mode-switch, .bottom-actions, .footer-actions { display: grid !important; grid-template-columns: 1fr 1fr; }
      .toolbar > *, .actions > *, .mode-switch > *, .bottom-actions > *, .footer-actions > * { width: 100%; }
      .question-text { font-size: 1rem !important; }
    }

  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title">AWS AIP 补抽题库刷题器</div>
      <div class="subtitle">仅使用你这次补抽并清洗后的题库制作。支持随机刷题、单选/多选判题、英文解析、错题本、本地统计持久化，以及断点续刷。</div>
    </div>

    <div class="topbar">
      <div class="card"><div class="stat-label">题库总数</div><div class="stat-value" id="statTotal">0</div></div>
      <div class="card"><div class="stat-label">当前轮进度</div><div class="stat-value" id="statProgress">0 / 0</div></div>
      <div class="card"><div class="stat-label">当前轮正确率</div><div class="stat-value" id="statAccuracy">0%</div></div>
      <div class="card"><div class="stat-label">累计错题数</div><div class="stat-value" id="statWrongBook">0</div></div>
    </div>

    <div class="toolbar">
      <button id="modeAllBtn" class="primary mode-active">随机全量模式</button>
      <button id="modeWrongBtn">错题本模式</button>
      <button id="restartBtn" class="ghost">重新洗牌本轮</button>
      <button id="resetProgressBtn" class="ghost">重置本轮进度</button>
      <button id="resetStatsBtn" class="ghost">清空本地统计</button>
      <span class="pill" id="modePill">当前模式：随机全量</span>
      <span class="pill" id="resumePill">进度：自动保存中</span>
    </div>

    <div class="card" style="margin-bottom:18px;">
      <div class="small" style="margin-bottom:8px;">本轮进度</div>
      <div class="progressbar"><div id="progressFill"></div></div>
    </div>

    <div id="questionWrap" class="card question-card"></div>
  </div>

  <script id="quiz-data" type="application/json">[{"id": "q0001", "question": "A company is developing a generative AI (GenAI) application by using Amazon Bedrock. The application will analyze patterns and relationships in the company's data. The application will process millions of new data points daily across AWS Regions in Europe, North America, and Asia before storing the data in Amazon S3.\n\nThe application must comply with local data protection and storage regulations. Data residency and processing must occur within the same continent. The application must also maintain audit trails of the application's decision-making processes and provide data classification capabilities.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Deploy the application in each Region with local IAM policies. Use Amazon Bedrock cross-Region inference to distribute the workload. Use Amazon CloudWatch to log Al decision-making processes. Manually track compliance certifications across Regions."}, {"key": "B", "text": "Use SCPs with AWS Organizations to manage location-specific permissions. Use AWS CloudTrail immutable logs to audit decision-making processes. Import a custom model into Amazon Bedrock and deploy the model to each Region."}, {"key": "C", "text": "Use Amazon S3 Object Lock with Region-specific S3 bucket policies. Pre-process the data points within the Region based on geographic origin before sending the data points to Amazon Bedrock. Use Amazon Macie to classify the data. Use AWS CloudTrail immutable logs to audit the decision-making processes."}, {"key": "D", "text": "Create separate AWS accounts for each Region with individual compliance frameworks. Use Amazon SageMaker Al with custom monitoring. Create manual compliance reports for each regulatory jurisdiction."}], "answers": ["C"], "answer_display": "C", "explanation_en": "This scenario requires strict data residency, regional processing, classification, and auditable decision trails, which Option C addresses using AWS-native governance services.\n\nRegion-specific Amazon S3 buckets enforce geographic data boundaries. Amazon S3 Object Lock ensures immutability of stored data and logs, supporting regulatory retention and non-repudiation requirements. Pre-processing data within the same Region before invoking Amazon Bedrock ensures that inference and data handling do not cross continental boundaries.\n\nAmazon Macie provides managed, automated data classification for sensitive data types such as PII and financial records, fulfilling the classification requirement without custom tooling.\n\nAWS CloudTrail immutable logs provide comprehensive audit trails of all API calls, model invocations, and data access events, ensuring traceability of Al decision-making processes.\n\nOption A violates residency rules through cross-Region inference. Option B does not provide data classification. Option D introduces high operational overhead and relies on manual compliance reporting.\n\nTherefore, Option C is the most compliant, scalable, and operationally efficient solution for regionally governed GenAI workloads.", "source": "94-95"}, {"id": "q0002", "question": "A company has set up Amazon Q Developer Pro licenses for all developers at the company. The company maintains a list of approved resources that developers must use when developing applications. The approved resources include internal libraries, proprietary algorithmic techniques, and sample code with approved styling.\n\nA new team of developers is using Amazon Q Developer to develop a new Java-based application. The company must ensure that the new developer team uses the company's approved resources. The company does not want to make project-level modifications.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Create a Git repository that contains all of the approved internal libraries, algorithms, and code samples. Include this Git repository in the application project locally as part of the workspace. Ensure that the developers use the workspace context to retrieve suggestions from the Git repository."}, {"key": "B", "text": "In the project root folder, create a folder named amazonq/rules. Add the approved internal libraries, algorithms, and code samples to the folder."}, {"key": "C", "text": "Create a folder in the application project named rules. Store the guidelines and code in the folder for Amazon Q Developer to reference for code suggestions."}, {"key": "D", "text": "Create an Amazon Q Developer customization that includes the approved data sources. Ensure that the developers use the customization to develop the application."}], "answers": ["D"], "answer_display": "D", "explanation_en": "Option D is the correct solution because Amazon Q Developer customizations are designed to incorporate organization-approved knowledge and coding guidance without requiring per-project changes. A customization can point Amazon Q Developer to curated internal sources such as approved libraries, coding standards, architectural patterns, and proprietary techniques. This allows the assistant's suggestions to align with company policies and preferred implementations consistently across teams and repositories.\n\nThe key requirement is that the company does not want to make project-level modifications. Options A, B, and C all require adding files or repositories into the project workspace, which directly violates this constraint. They also rely on developer behavior to \"use workspace context,\" which is harder to enforce and can lead to inconsistent adherence to standards.\n\nWith a customization, the organization centrally manages and updates approved resources. This reduces operational overhead because updates to libraries, patterns, or guidelines propagate automatically to developers using the customization, without requiring changes to each project. This is especially valuable for a new team, where consistent enforcement of approved practices is important to reduce compliance risk, security issues, and inconsistent code style.\n\nAdditionally, customizations support governance by allowing the company to standardize how Amazon Q Developer responds, ensuring that suggestions reflect approved internal content rather than generic public patterns.\n\nTherefore, Option D best satisfies the requirement for centralized enforcement of approved resources with minimal ongoing management and no project-level modifications.", "source": "95-96"}, {"id": "q0003", "question": "A company developed a multimodal content analysis application by using Amazon Bedrock. The application routes different content types (text, images, and code) to specialized foundation models (FMs).\n\nThe application needs to handle multiple types of routing decisions. Simple routing based on file extension must have minimal latency. Complex routing based on content semantics requires analysis before FM selection. The application must provide detailed history and support fallback options when primary FMs fail.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Configure AWS Lambda functions that call Amazon Bedrock FMs for all routing logic. Use conditional statements to determine the appropriate FM based on content type and semantics."}, {"key": "B", "text": "Create a hybrid solution. Handle simple routing based on file extensions in application code. Handle complex content-based routing by using an AWS Step Functions state machine with JSONata for content analysis and the InvokeModel API for specialized FMs."}, {"key": "C", "text": "Deploy separate AWS Step Functions workflows for each content type with routing logic in AWS Lambda functions. Use Amazon EventBridge to coordinate between workflows when fallback to alternate FMs is required."}, {"key": "D", "text": "Use Amazon SQS with different SQS queues for each content type. Configure AWS Lambda consumers that analyze content and invoke appropriate FMs based on message attributes by using Amazon Bedrock with an AWS SDK."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B is the most appropriate solution because it directly aligns with AWS-recommended architectural patterns for building scalable, observable, and resilient generative AI applications on Amazon Bedrock. The requirements clearly distinguish between simple and complex routing decisions, and this option addresses both in an optimal way.\n\nSimple routing based on file extension is latency sensitive. Handling this logic directly in the application code avoids unnecessary orchestration, state transitions, and service calls. This approach ensures that straightforward requests, such as routing images to vision-capable foundation models or text files to language models, are processed with minimal overhead and maximum performance.\n\nFor complex routing based on content semantics, AWS Step Functions is specifically designed for multi-step workflows that require analysis, branching logic, and error handling. Semantic routing often requires inspecting meaning, intent, or structure before selecting the appropriate foundation model. Step Functions enables this by orchestrating analysis steps and applying conditional logic to determine the correct model to invoke using the Amazon Bedrock InvokeModel API.\n\nA key requirement is detailed execution history. Step Functions provides built-in execution tracing, including state inputs, outputs, and error details, which is essential for auditing, debugging, and compliance.\n\nAdditionally, Step Functions supports native retry and catch mechanisms, allowing the workflow to automatically fall back to alternate foundation models if a primary model invocation fails. This directly satisfies the fallback requirement without introducing excessive custom code.\n\nThe other options lack one or more critical capabilities. Lambda-only logic lacks deep observability and structured fallback handling, SQS introduces additional latency and limited workflow visibility, and multiple coordinated workflows increase architectural complexity without added benefit.", "source": "96-97"}, {"id": "q0004", "question": "A company is developing a customer communication platform that uses an Al assistant powered by an Amazon Bedrock foundation model (FM). The Al assistant summarizes customer messages and generates initial response drafts.\n\nThe company wants to use Amazon Comprehend to implement layered content filtering. The layered content filtering must prevent sharing of offensive content, protect customer privacy, and detect potential inappropriate advice solicitation. Inappropriate advice solicitation includes requests for unethical practices, harmful activities, or manipulative behaviors.\n\nThe solution must maintain acceptable overall response times, so all pre-processing filters must finish before the content reaches the FM.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Use parallel processing with asynchronous API calls. Use toxicity detection for offensive content. Use prompt safety classification for inappropriate advice solicitation. Use personally identifiable information (PII) detection without redaction."}, {"key": "B", "text": "Use custom classification to build an FM that detects offensive content and inappropriate advice solicitation. Apply personally identifiable information (PII) detection as a secondary filter only when messages pass the custom classifier."}, {"key": "C", "text": "Deploy a multi-stage process. Configure the process to use prompt safety classification first, then toxicity detection on safe prompts only, and finally personally identifiable information (PII) detection in streaming mode. Route flagged messages through Amazon EventBridge for human review."}, {"key": "D", "text": "Use toxicity detection with thresholds configured to 0.5 for all categories. Use parallel processing for both prompt safety classification and personally identifiable information (PII) detection with entity redaction. Apply Amazon CloudWatch alarms to filter metrics."}], "answers": ["D"], "answer_display": "D", "explanation_en": "Option D best satisfies all functional, performance, and governance requirements while minimizing architectural complexity. The requirement explicitly states that all filtering must complete before content reaches the foundation model, which rules out asynchronous or streaming-based approaches that could delay enforcement.\n\nAmazon Comprehend supports toxicity detection, prompt safety classification, and PII detection with entity redaction as managed capabilities. Running these filters in parallel ensures low end-to-end latency, which is essential for customer-facing communication platforms. Parallel execution avoids the cumulative latency that would be introduced by sequential pipelines.\n\nToxicity detection identifies offensive or abusive content early. Prompt safety classification detects requests for unethical, harmful, or manipulative advice, which directly addresses inappropriate advice solicitation requirements. PII detection with entity redaction ensures that customer privacy is preserved before data is sent to the FM, preventing sensitive information from being processed or echoed in generated responses.\n\nConfiguring thresholds allows fine-grained control over sensitivity while maintaining acceptable false-positive rates. Using CloudWatch metrics and alarms enables continuous monitoring of filtering behavior and intervention rates without adding custom routing or human review pipelines that would slow responses.\n\nOption A lacks PII redaction. Option B introduces unnecessary model-building complexity and delayed PII checks. Option C adds sequential latency and introduces human review routing, which violates the response-time requirement.\n\nTherefore, Option D provides the most robust, performant, and AWS-aligned layered content filtering solution.", "source": "97-99"}, {"id": "q0005", "question": "A software company is using Amazon Q Business to build an Al assistant that allows employees to access company information and personal information by using natural language prompts. The company stores this information in an Amazon S3 bucket.\n\nEach department in the company has a dedicated prefix in the S3 bucket. Each object name includes the S3 prefix of the department that it belongs to. Each department can belong to only a single group in AWS IAM Identity Center. Each employee belongs to a single department.\n\nThe company configures Amazon Q Business to access data stored in an S3 bucket as a data source. The company needs to ensure that the AI assistant respects access controls based on the user's IAM Identity Center group membership.\n\nWhich solution will meet this requirement with the LEAST operational overhead?", "question_type": "single", "options": [{"key": "A", "text": "Create a JSON file named acl.json in each department folder. In each file, create access control entries that specify the IAM Identity Center group that should have access to that department's data. Indicate the location of the JSON file in the Access Control section of the data source settings."}, {"key": "B", "text": "Create a single JSON file named acl.json at the top level of the S3 bucket. Add access control entries that map each department's S3 prefix to its corresponding IAM Identity Center group. Indicate the location of the JSON file in the Access Control section of the data source settings."}, {"key": "C", "text": "For each IAM Identity Center group, create a separate permissions set that denies access to all prefixes in the S3 bucket. Add a StringNotEquals condition key to the permissions set for each group that specifies the department each group is associated with. Attach the permissions sets to the Identity Center groups."}, {"key": "D", "text": "Create a metadata file named metadata.json at the top level of the S3 bucket. Add an AccessControlList object to the file that specifies the S3 path of each department's prefix. Specify the IAM Identity Center group that should have access to each department's prefix. Reference the file location in the data source metadata settings."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B is the correct solution because Amazon Q Business natively supports access control lists (ACLs) for S3 data sources using a single, centralized JSON file that maps S3 prefixes to IAM Identity Center groups. This approach directly aligns with the company's data organization model, where each department's data is stored under a distinct S3 prefix and each employee belongs to exactly one department group.\n\nUsing a single acl.json file at the bucket root minimizes operational overhead by centralizing access control logic in one location. Administrators can update department mappings without touching individual folders or changing IAM permissions, which simplifies governance and reduces the risk of configuration drift. Amazon Q Business automatically evaluates the user's IAM Identity Center group membership at query time and filters accessible documents accordingly.\n\nOption A increases operational complexity by requiring a separate ACL file in every department folder, which becomes difficult to maintain as departments or prefixes change. Option C attempts to enforce access using IAM permissions sets, but Amazon Q Business access control for S3 data sources is not designed to be managed through IAM condition logic and would significantly increase complexity. Option D introduces a custom metadata structure that is not the supported mechanism for Amazon Q Business access enforcement.\n\nTherefore, Option B provides the cleanest, most scalable, and AWS-recommended solution for enforcing department-based access control with the least operational effort.", "source": "99-100"}, {"id": "q0006", "question": "A company uses AWS Lake Formation to set up a data lake that contains databases and tables for multiple business units across multiple AWS Regions. The company wants to use a foundation model (FM) through Amazon Bedrock to perform fraud detection. The FM must ingest sensitive financial data from the data lake.\n\nThe data includes some customer personally identifiable information (PII).\n\nThe company must design an access control solution that prevents PII from appearing in a production environment. The FM must access only authorized data subsets that have PII redacted from specific data columns. The company must capture audit trails for all data access.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Create a separate dataset in a separate Amazon S3 bucket for each business unit and Region combination. Configure S3 bucket policies to control access based on IAM roles that are assigned to FM training instances. Use S3 access logs to track data access."}, {"key": "B", "text": "Configure the FM to authenticate by using AWS Identity and Access Management roles and Lake Formation permissions based on LF-Tag expressions. Define business units and Regions as LF-Tags that are assigned to databases and tables. Use AWS CloudTrail to collect comprehensive audit trails of data access."}, {"key": "C", "text": "Use direct IAM principal grants on specific databases and tables in Lake Formation. Create a custom application layer that logs access requests and further filters sensitive columns before sending data to the FM."}, {"key": "D", "text": "Configure the FM to request temporary credentials from AWS Security Token Service. Access the data by using presigned S3 URLs that are generated by an API that applies business unit and Regional filters. Use AWS CloudTrail to collect comprehensive audit trails of data access."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B is the correct solution because it uses native AWS governance, access control, and auditing capabilities to protect PII while enabling controlled FM access to authorized data subsets. AWS Lake Formation is designed specifically to manage fine-grained permissions for data lakes, including column-level access control, which is critical when handling sensitive financial and PII data.\n\nLF-Tags allow data administrators to define scalable, attribute-based access control policies. By tagging databases, tables, and columns with business unit and Region metadata, the company can enforce policies that ensure the foundation model only accesses approved datasets with PII-redacted columns. This eliminates the risk of sensitive data leaking into production inference workflows.\n\nIAM role-based authentication ensures that the FM accesses data using least-privilege credentials. This integrates cleanly with Amazon Bedrock, which supports IAM-based authorization for service-to-service access. AWS CloudTrail provides immutable audit logs for all access attempts, satisfying compliance and regulatory requirements.\n\nOption A introduces unnecessary data duplication and weak governance controls. Option C relies on custom application logic, increasing operational risk and complexity. Option D bypasses Lake Formation's fine-grained controls and relies on presigned URLs, which reduces governance visibility and control.\n\nTherefore, Option B best meets the requirements for security, compliance, scalability, and auditability when integrating Amazon Bedrock with a Lake Formation-governed data lake.", "source": "100-101"}, {"id": "q0007", "question": "A medical device company wants to feed reports of medical procedures that used the company's devices into an Al assistant. To protect patient privacy, the Al assistant must expose patient personally identifiable information (PII) only to surgeons. The Al assistant must redact PII for engineers. The Al assistant must reference only medical reports that are less than 3 years old.\n\nThe company stores reports in an Amazon S3 bucket as soon as each report is published. The company has already set up an Amazon Bedrock Knowledge Bases. The Al assistant uses Amazon Cognito to authenticate users.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Enable Amazon Macie PII detection on the S3 bucket. Use an S3 trigger to invoke an AWS Lambda function that redacts PII from the reports. Configure the Lambda function to delete outdated documents and invoke knowledge base syncing."}, {"key": "B", "text": "Invoke an AWS Lambda function to sync the S3 bucket and the knowledge base when a new report is uploaded. Use a second Lambda function with Amazon Comprehend to redact PII for engineers. Use S3 Lifecycle rules to remove reports older than 3 years."}, {"key": "C", "text": "Set up an S3 Lifecycle configuration to remove reports that are older than 3 years. Schedule an AWS Lambda function to run daily syncs between the bucket and the knowledge base. When users interact with the Al assistant, apply a guardrail configuration selected based on the user's Cognito user group to redact PII from responses when required."}, {"key": "D", "text": "Create a second knowledge base. Use Lambda and Amazon Comprehend to redact PII before syncing to the second knowledge base. Route users to the appropriate knowledge base based on Cognito group membership."}], "answers": ["C"], "answer_display": "C", "explanation_en": "Option C is the correct solution because it enforces privacy controls at inference time, not at ingestion time, which is required when different user roles require different visibility into the same underlying data.\n\nUsing an S3 Lifecycle configuration ensures that documents older than 3 years are automatically removed, guaranteeing that the knowledge base references only compliant, recent medical reports. Scheduling Lambda-based syncs keeps the knowledge base aligned with the bucket contents without introducing complex per-upload orchestration.\n\nThe most important requirement is role-based PII exposure. Amazon Bedrock guardrails support dynamic application at inference time, allowing the system to select a guardrail configuration based on the authenticated user's Amazon Cognito group. Surgeons can receive full responses, while engineers receive responses with PII masked-without duplicating data or maintaining multiple knowledge bases.\n\nThis approach preserves a single source of truth for medical reports while enforcing privacy through response-level controls. It also maintains full auditability of access and redaction behavior.\n\nOption A permanently removes PII and violates surgeon access requirements. Option B redacts data inconsistently and couples privacy logic to ingestion. Option D doubles storage, increases cost, and introduces data drift risk.\n\nTherefore, Option C best meets privacy, compliance, scalability, and operational efficiency requirements.", "source": "101-102"}, {"id": "q0008", "question": "An elevator service company has developed an Al assistant application by using Amazon Bedrock. The application generates elevator maintenance recommendations to support the company's elevator technicians.\n\nThe company uses Amazon Kinesis Data Streams to collect the elevator sensor data.\n\nNew regulatory rules require that a human technician must review all AI-generated recommendations. The company needs to establish human oversight workflows to review and approve Al recommendations. The company must store all human technician review decisions for audit purposes.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Create a custom approval workflow by using AWS Lambda functions and Amazon SQS queues for human review of Al recommendations. Store all review decisions in Amazon DynamoDB for audit purposes."}, {"key": "B", "text": "Create an AWS Step Functions workflow that has a human approval step that uses the waitForTask Token API to pause execution. After a human technician completes a review, use an AWS Lambda function to call the SendTaskSuccess API with the approval decision. Store all review decisions in Amazon DynamoDB."}, {"key": "C", "text": "Create an AWS Glue workflow that has a human approval step. After the human technician review, integrate the application with an AWS Lambda function that calls the SendTaskSuccess API. Store all human technician review decisions in Amazon DynamoDB."}, {"key": "D", "text": "Configure Amazon EventBridge rules with custom event patterns to route Al recommendations to human technicians for review. Create AWS Glue jobs to process human technician approval queues. Use Amazon ElastiCache to cache all human technician review decisions."}], "answers": ["B"], "answer_display": "B", "explanation_en": "AWS Step Functions provides native support for human-in-the-loop workflows, making it the best fit for regulatory oversight requirements. The waitForTaskToken integration pattern is explicitly designed to pause a workflow until an external actor-such as a human reviewer completes a task.\n\nIn this architecture, AI-generated recommendations are sent to a human technician for review. The workflow pauses execution using a task token. Once the technician approves or rejects the recommendation, an AWS Lambda function calls SendTaskSuccess or SendTaskFailure, allowing the workflow to continue deterministically.\n\nThis approach ensures full auditability, as Step Functions records every state transition, timestamp, and execution path. Storing review outcomes in Amazon DynamoDB provides durable, queryable audit records required for regulatory compliance.\n\nOption A requires custom orchestration and lacks native workflow state management. Option C incorrectly uses AWS Glue, which is not designed for approval workflows. Option D uses caching instead of durable audit storage and introduces unnecessary complexity.\n\nTherefore, Option B is the AWS-recommended, lowest-risk, and most auditable solution for mandatory human review of Al outputs.", "source": "102-103"}, {"id": "q0009", "question": "A company is creating a workflow to review customer-facing communications before the company sends the communications. The company uses a pre-defined message template to generate the communications and stores the communications in an Amazon S3 bucket. The workflow needs to capture a specific portion from the template and send it to an Amazon Bedrock model. The workflow must store model responses back to the original S3 bucket.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Create a flow in Amazon Bedrock Flows. Configure S3 action nodes at the beginning and end of the flow to retrieve and store the communications and the model responses. In the middle of the flow, configure an expression to parse each communication. Configure an agent step to send the parsed input to the model for review."}, {"key": "B", "text": "Create an AWS Step Functions Express workflow state machine. Use an Amazon S3 integration GetObject step to retrieve the original communications. Use an intrinsic function Pass step to parse the communications and to pass the results to an Amazon Bedrock InvokeModel step. Configure an Amazon S3 integration PutObject step to store the model responses back to the S3 bucket."}, {"key": "C", "text": "Create an Amazon Bedrock agent that has an action group. Configure instructions to define how the agent should parse the communications. Configure the action group to retrieve the communications from the S3 bucket, invoke the Amazon Bedrock model, and store the model responses back to the S3 bucket."}, {"key": "D", "text": "Create an Amazon Bedrock agent that has a single action group. Configure three AWS Lambda functions in the action group. Configure the functions to retrieve the communications from the S3 bucket, parse the communications and invoke the Amazon Bedrock model, and store the model responses back to the S3 bucket."}], "answers": ["A"], "answer_display": "A", "explanation_en": "Option A is the correct answer because Amazon Bedrock Flows is purpose-built to orchestrate generative Al workflows that combine data access, deterministic transformations, and model invocation with minimal operational overhead. The requirements explicitly state that the workflow must retrieve content from Amazon S3, extract a specific portion of a predefined template, send that portion to an Amazon Bedrock model, and store the model's response back into the same S3 bucket. Amazon Bedrock Flows natively supports all of these steps.\n\nBy configuring S3 action nodes at the beginning and end of the flow, the workflow can retrieve the original communications and persist the reviewed output without custom code. The expression step allows deterministic parsing of a specific portion of the template, which is essential when only part of the message should be reviewed. This avoids relying on generative logic for parsing, which would be less predictable and harder to audit. The agent step is then used specifically for the review task, where the foundation model evaluates or modifies the extracted content.\n\nOption B uses AWS Step Functions, which can achieve similar outcomes but requires more explicit orchestration logic and does not provide GenAI-native constructs such as expressions and agent steps in a single managed experience. Options C and D rely on Amazon Bedrock agents and AWS Lambda functions to handle parsing and data movement, which increases complexity, operational overhead, and maintenance burden.\n\nBecause Amazon Bedrock Flows directly integrates S3 actions, parsing expressions, and model review steps in a single managed workflow, Option A best meets the requirements with the least development and operational effort.", "source": "103-104"}, {"id": "q0010", "question": "A company is building a multicloud generative AI (GenAI)-powered secret resolution application that uses Amazon Bedrock and Agent Squad. The application resolves secrets from multiple sources, including key stores and hardware security modules (HSMs). The application uses AWS Lambda functions to retrieve secrets from the sources. The application uses AWS AppConfig to implement dynamic feature gating. The application supports secret chaining and detects secret drift. The application handles short-lived and expiring secrets. The application also supports prompt flows for templated instructions. The application uses AWS Step Functions to orchestrate agents to resolve the secrets and to manage secret validation and drift detection.\n\nThe company finds multiple issues during application testing. The application does not refresh expired secrets in time for agents to use. The application sends alerts for secret drift, but agents still use stale data. Prompt flows within the application reuse outdated templates, which cause cascading failures. The company must resolve the performance issues.\n\nWhich solution will meet this requirement?", "question_type": "single", "options": [{"key": "A", "text": "Use Step Functions Map states to run agent workflows in parallel. Pass updated secret metadata through Lambda function outputs. Use AWS AppConfig to version all prompt flows to gate and roll back faulty templates."}, {"key": "B", "text": "Use Amazon Bedrock Agents only. Configure Amazon Bedrock guardrails to restrict prompt variation. Use an inline JSON schema for a single agent's workflow definition to chain tool calls."}, {"key": "C", "text": "Use a centralized Amazon EventBridge pipeline to invoke each agent. Store intermediate prompts in Amazon DynamoDB. Resolve agent ordering by using TTL-based backoff and retries."}, {"key": "D", "text": "Use Amazon EventBridge Pipes to invoke resolvers based on Amazon CloudWatch log patterns. Store response metadata in DynamoDB with TTL and versioned writes. Use Amazon Q Developer to dynamically generate fallback prompts."}], "answers": ["A"], "answer_display": "A", "explanation_en": "Option A is the correct solution because it directly addresses all identified failure modes while preserving the existing Step Functions-based orchestration architecture with minimal redesign.\n\nUsing Step Functions Map states enables parallel execution of secret resolution workflows, which improves refresh latency for short-lived and expiring secrets. This ensures that secrets are refreshed in time before downstream agents require them. Passing updated secret metadata through Lambda outputs guarantees that subsequent steps always consume the latest resolved values, preventing agents from using stale data even after drift alerts are generated.\n\nVersioning prompt flows in AWS AppConfig is critical to resolving cascading failures caused by outdated templates. AppConfig natively supports version control, validation, staged rollout, and rollback of configuration artifacts. By gating prompt flows through AppConfig, the company can immediately roll back faulty templates and prevent agents from reusing outdated instructions.\n\nThis solution maintains clear separation of concerns: Step Functions handle orchestration and parallelism, Lambda handles secret retrieval and metadata propagation, and AppConfig governs prompt lifecycle management. No additional event pipelines or custom retry coordination layers are required.\n\nOption B oversimplifies the architecture and does not address secret lifecycle or drift. Option C introduces event-driven ordering complexity without solving prompt versioning. Option D introduces unnecessary tooling and dynamic prompt generation risk.\n\nTherefore, Option A best resolves performance, correctness, and stability issues while minimizing operational overhead.", "source": "104-106"}, {"id": "q0011", "question": "A company provides a service that helps users from around the world discover new restaurants. The service has 50 million monthly active users. The company wants to implement a semantic search solution across a database that contains 20 million restaurants and 200 million reviews. The company currently stores the data in PostgreSQL.\n\nThe solution must support complex natural language queries and return results for at least 95% of queries within 500 ms. The solution must maintain data freshness for restaurant details that update hourly. The solution must also scale cost-effectively during peak usage periods.\n\nWhich solution will meet these requirements with the LEAST development effort?", "question_type": "single", "options": [{"key": "A", "text": "Migrate the restaurant data to Amazon OpenSearch Service. Implement keyword-based search rules that use custom analyzers and relevance tuning to find restaurants based on attributes such as cuisine type, features, and location. Create Amazon API Gateway HTTP API endpoints to transform user queries into structured search parameters."}, {"key": "B", "text": "Migrate the restaurant data to Amazon OpenSearch Service. Use a foundation model (FM) in Amazon Bedrock to generate vector embeddings from restaurant descriptions, reviews, and menu items. When users submit natural language queries, convert the queries to embeddings by using the same FM. Perform k-nearest neighbors (k-NN) searches to find semantically similar results."}, {"key": "C", "text": "Keep the restaurant data in PostgreSQL and implement a pgvector extension. Use a foundation model (FM) in Amazon Bedrock to generate vector embeddings from restaurant data. Store the vector embeddings directly in PostgreSQL. Create an AWS Lambda function to convert natural language queries to vector representations by using the same FM. Configure the Lambda function to perform similarity searches within the database."}, {"key": "D", "text": "Migrate restaurant data to an Amazon Bedrock knowledge base by using a custom ingestion pipeline. Configure the knowledge base to automatically generate embeddings from restaurant information. Use the Amazon Bedrock Retrieve API with built-in vector search capabilities to query the knowledge base directly by using natural language input."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B best satisfies the requirements while minimizing development effort by combining managed semantic search capabilities with fully managed foundation models. AWS Generative Al guidance describes semantic search as a vector-based retrieval pattern where both documents and user queries are embedded into a shared vector space. Similarity search (such as k-nearest neighbors) then retrieves results based on meaning rather than exact keywords.\n\nAmazon OpenSearch Service natively supports vector indexing and k-NN search at scale. This makes it well suited for large datasets such as 20 million restaurants and 200 million reviews while still achieving sub-second latency for the majority of queries. Because OpenSearch is a distributed, managed service, it automatically scales during peak traffic periods and provides cost-effective performance compared with building and tuning custom vector search pipelines on relational databases.\n\nUsing Amazon Bedrock to generate embeddings significantly reduces development complexity. AWS manages the foundation models, eliminates the need for custom model hosting, and ensures consistency by using the same FM for both document embeddings and query embeddings. This aligns directly with AWS-recommended semantic search architectures and removes the need for model lifecycle management.\n\nHourly updates to restaurant data can be handled efficiently through incremental re-indexing in OpenSearch without disrupting query performance. This approach cleanly separates transactional data storage from search workloads, which is a best practice in AWS architectures.\n\nOption A does not meet the semantic search requirement because keyword-based search cannot reliably interpret complex natural language intent. Option C introduces scalability and performance risks by running large-scale vector similarity searches inside PostgreSQL, which increases operational complexity. Option D adds unnecessary ingestion and abstraction layers intended for retrieval-augmented generation, not high-throughput semantic search.\n\nTherefore, Option B provides the optimal balance of performance, scalability, data freshness, and minimal development effort using AWS Generative Al services.", "source": "106-107"}, {"id": "q0012", "question": "An ecommerce company is building an internal platform to develop generative Al applications by using Amazon Bedrock foundation models (FMs). Developers need to select models based on evaluations that are aligned to ecommerce use cases. The platform must display accuracy metrics for text generation and summarization in dashboards. The company has custom ecommerce datasets to use as standardized evaluation inputs.\n\nWhich combination of steps will meet these requirements with the LEAST operational overhead? (Select TWO.)", "question_type": "multiple", "options": [{"key": "A", "text": "Import the datasets to an Amazon S3 bucket. Provide appropriate IAM permissions and cross-origin resource sharing (CORS) permissions to give the evaluation jobs access to the datasets."}, {"key": "B", "text": "Import the datasets to an Amazon S3 bucket. Provide appropriate IAM permissions and a VPC endpoint configuration to give the evaluation jobs access to the datasets."}, {"key": "C", "text": "Configure an AWS Lambda function to create model evaluation jobs on a schedule in the Amazon Bedrock console. Provide the URI of the S3 bucket that contains the datasets as an input. Configure the evaluation jobs to measure the real world knowledge (RWK) score for text generation and BERTScore for summarization. Configure a second Lambda function to check the status of the jobs and publish custom logs to Amazon CloudWatch. Create a custom Amazon CloudWatch Logs Insights dashboard."}, {"key": "D", "text": "Use Amazon SageMaker Clarify on a schedule to create model evaluation jobs. Use open source frameworks to create and run standardized evaluations. Publish results to Amazon CloudWatch namespaces. Use an AWS Lambda function to check the status of the jobs and publish custom logs to Amazon CloudWatch. Create a custom Amazon CloudWatch Logs Insights dashboard."}, {"key": "E", "text": "Run an Amazon SageMaker Al notebook job on a schedule by using the fmvelos or ragas framework to run evaluations that use the datasets in the S3 bucket. Write Python code in the notebook that makes direct InvokeModel API calls to the FMs and processes their responses for evaluation. Publish job status and results to Amazon CloudWatch Logs to measure the real world knowledge (RWK) score for text generation and toxicity for summarization as metrics for accuracy. Create a custom CloudWatch Logs Insights dashboard."}], "answers": ["B", "C"], "answer_display": "BC", "explanation_en": "The least operational overhead approach is to use managed Amazon Bedrock model evaluation workflows with datasets stored in Amazon S3, and then publish results into Amazon CloudWatch for dashboards. That is exactly what options B and C combine.\n\nStep B correctly places standardized evaluation inputs in Amazon S3 and focuses on granting the evaluation workflow the right permissions to read those datasets. In practice, the key requirement is controlled access to the S3 objects used as evaluation datasets. Establishing IAM permissions and private access patterns (such as using VPC connectivity patterns where applicable to the organization's networking posture) is aligned with enterprise requirements and avoids building custom storage or data distribution systems for evaluators.\n\nStep C then operationalizes the evaluation lifecycle with minimal infrastructure: a scheduled AWS Lambda function starts evaluation jobs using the S3 dataset location, and a second Lambda function checks job status and pushes results and operational signals to CloudWatch. This meets the platform requirement to surface accuracy metrics in dashboards because CloudWatch metrics/logs can be visualized in dashboards and queried through CloudWatch Logs Insights. It also supports continuous, standardized comparisons across models without requiring developers to run ad-hoc experiments.\n\nThe alternatives introduce more operational burden. D and E rely on Amazon SageMaker-based tooling, notebook jobs, and open source evaluation frameworks, which require more environment management, dependency control, scaling considerations, and maintenance over time. A includes CORS, which is primarily a browser-access concern and does not address how Bedrock-managed evaluation jobs securely access S3 in the typical service-to-service pattern.\n\nTherefore, B+C achieves standardized model evaluation, automated scheduling, and dashboard-ready observability with the smallest operations footprint.", "source": "107-108"}, {"id": "q0013", "question": "A company is developing a generative AI (GenAI)-powered customer support application that uses Amazon Bedrock foundation models (FMs). The application must maintain conversational context across multiple interactions with the same user. The application must run clarification workflows to handle ambiguous user queries. The company must store encrypted records of each user conversation to use for personalization. The application must be able to handle thousands of concurrent users while responding to each user quickly.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Use an AWS Step Functions Express workflow to orchestrate conversation flow. Invoke AWS Lambda functions to run clarification logic. Store conversation history in Amazon RDS and use session IDs as the primary key."}, {"key": "B", "text": "Use an AWS Step Functions Standard workflow to orchestrate clarification workflows. Include Wait for a Callback patterns to manage the workflows. Store conversation history in Amazon DynamoDB. Purchase on-demand capacity and configure server-side encryption."}, {"key": "C", "text": "Deploy the application by using an Amazon API Gateway REST API to route user requests to an AWS Lambda function to update and retrieve conversation context. Store conversation history in Amazon S3 and configure server-side encryption. Save each interaction as a separate JSON file."}, {"key": "D", "text": "Use AWS Lambda functions to call Amazon Bedrock inference APIs. Use Amazon SQS queues to orchestrate clarification steps. Store conversation history in an Amazon ElastiCache (Redis OSS) cluster. Configure encryption at rest."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B is the correct solution because it provides a scalable, durable, and secure architecture for conversational GenAI workloads that require multi-step clarification workflows and persistent memory.\n\nAWS Step Functions Standard workflows are designed for long-running, stateful workflows with high reliability, which is ideal for clarification loops that may require multiple back-and-forth interactions. The Wait for a Callback pattern allows the workflow to pause while awaiting additional user input, making it well-suited for handling ambiguous queries without losing execution state.\n\nStoring conversation history in Amazon DynamoDB enables millisecond-latency reads and writes at massive scale, supporting thousands of concurrent users. DynamoDB's on-demand capacity mode automatically scales with traffic, eliminating capacity planning. Server-side encryption ensures that stored conversation data is encrypted at rest, meeting security and compliance requirements for personalized data.\n\nOption A uses Step Functions Express and Amazon RDS, which is not ideal for long-lived conversational workflows and introduces scaling and connection management challenges. Option C stores conversations as individual S3 objects, which increases latency and complicates context retrieval. Option D relies on Amazon ElastiCache, which is optimized for ephemeral caching rather than durable, auditable conversation history.\n\nTherefore, Option B best balances scalability, performance, durability, and security for a conversational Amazon Bedrock-based customer support application.", "source": "108-109"}, {"id": "q0014", "question": "A company is using Amazon Bedrock to develop a customer support Al assistant. The AI assistant must respond to customer questions about their accounts. The Al assistant must not expose personal information in responses. The company must comply with data residency policies by ensuring that all processing occurs within the same AWS Region where each customer is located.\n\nThe company wants to evaluate how effective the AI assistant is at preventing the exposure of personal information before the company makes the Al assistant available to customers.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Configure a cross-Region Amazon Bedrock guardrail to apply sensitive information filters. Set the guardrail to detect mode during development and testing. Switch to block mode for production deployment."}, {"key": "B", "text": "Configure an Amazon Bedrock guardrail to apply sensitive information filters. Set the guardrail to mask mode during development and testing. Switch to block mode for production deployment. Deploy a copy of the guardrail to each Region where the company operates."}, {"key": "C", "text": "Configure an Amazon Bedrock guardrail to apply content and topic filters. Set the guardrail to detect mode during development, testing, and production. Disable invocation logging for the Amazon Bedrock model."}, {"key": "D", "text": "Configure a cross-Region Amazon Bedrock guardrail to apply a set of content and word filters. Set the guardrail to detect mode during development and testing. Switch to mask mode for production deployment."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B best meets all stated requirements by correctly combining PII protection, evaluation before launch , and data residency compliance using Amazon Bedrock Guardrails. Amazon Bedrock guardrails provide native sensitive information filtering that operates inline during model invocation, making them well suited for preventing personal data exposure in customer-facing AI assistants.\n\nThe requirement to evaluate how effective the Al assistant is at preventing exposure before release is best addressed by using mask mode during development and testing. Mask mode allows responses to be generated while automatically redacting detected personal information, making it easy for developers and reviewers to see where and how PII would have appeared. This provides concrete validation that the guardrail rules are correctly configured without fully blocking responses, which is ideal for quality assurance and pre-production evaluation.\n\nFor production, switching the guardrail to block mode ensures that responses containing personal information are fully prevented from being returned to users. This offers the strongest protection and aligns with compliance expectations for customer account data. Block mode is appropriate once confidence in the guardrail configuration has been established during testing.\n\nThe data residency requirement is addressed by deploying a copy of the guardrail in each AWS Region where the application operates. Amazon Bedrock guardrails are Region-specific resources, and using Region-local guardrails ensures that inference, filtering, and enforcement all occur within the same Region as the customer data. This avoids cross-Region processing and helps the company comply with regulatory and contractual data residency policies.\n\nOption A and D incorrectly rely on cross-Region guardrails, which can violate data residency constraints. Option C focuses on topic filtering rather than sensitive information filtering and keeps detect mode enabled in production, which does not actively prevent PII exposure. Therefore, B is the only option that fully satisfies safety, compliance, and evaluation requirements.", "source": "109-111"}, {"id": "q0015", "question": "A company has a customer service application that uses Amazon Bedrock to generate personalized responses to customer inquiries. The company needs to establish a quality assurance process to evaluate prompt effectiveness and model configurations across updates. The process must automatically compare outputs from multiple prompt templates, detect response quality issues, provide quantitative metrics, and allow human reviewers to give feedback on responses. The process must prevent configurations that do not meet a predefined quality threshold from being deployed.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Create an AWS Lambda function that sends sample customer inquiries to multiple Amazon Bedrock model configurations and stores responses in Amazon S3. Use Amazon QuickSight to visualize response patterns. Manually review outputs daily. Use AWS CodePipeline to deploy configurations that meet the quality threshold."}, {"key": "B", "text": "Use Amazon Bedrock evaluation jobs to compare model outputs by using custom prompt datasets. Configure AWS CodePipeline to run the evaluation jobs when prompt templates change. Configure CodePipeline to deploy only configurations that exceed the predefined quality threshold."}, {"key": "C", "text": "Set up Amazon CloudWatch alarms to monitor response latency and error rates from Amazon Bedrock. Use Amazon EventBridge rules to notify teams when thresholds are exceeded. Configure a manual approval workflow in AWS Systems Manager."}, {"key": "D", "text": "Use AWS Lambda functions to create an automated testing framework that samples production traffic and routes duplicate requests to the updated model version. Use Amazon Comprehend sentiment analysis to compare results. Block deployment if sentiment scores decrease."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B is the correct solution because Amazon Bedrock evaluation jobs are purpose-built to assess prompt effectiveness, model behavior, and response quality in a repeatable and automated manner. Evaluation jobs support both quantitative metrics and LLM-based judgment, making them suitable for detecting subtle response quality regressions that simple sentiment or latency metrics cannot capture.\n\nBy using custom prompt datasets, the company can consistently test multiple prompt templates and model configurations against the same inputs. This enables accurate comparison across updates and eliminates variability introduced by live traffic sampling. Amazon Bedrock evaluation jobs also support structured scoring outputs, which can be used to enforce objective quality thresholds.\n\nIntegrating evaluation jobs directly into AWS CodePipeline ensures that quality checks are automatically triggered whenever prompt templates or configurations change. This creates a gated deployment workflow in which only configurations that meet or exceed the predefined quality threshold are promoted. This directly satisfies the requirement to prevent low-quality configurations from being deployed.\n\nHuman reviewers can be incorporated by reviewing evaluation results and scores produced by the jobs, enabling informed feedback without manual data collection. Option A and D rely on custom frameworks and indirect quality signals, increasing complexity and reducing reliability. Option C focuses on operational health rather than response quality.\n\nTherefore, Option B provides the most robust, scalable, and AWS-aligned quality assurance process for Amazon Bedrock-based applications.", "source": "111-112"}, {"id": "q0016", "question": "A company is building a legal research Al assistant that uses Amazon Bedrock with an Anthropic Claude foundation model (FM). The AI assistant must retrieve highly relevant case law documents to augment the FM's responses. The Al assistant must identify semantic relationships between legal concepts, specific legal terminology, and citations. The Al assistant must perform quickly and return precise results.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Configure an Amazon Bedrock knowledge base to use a default vector search configuration. Use Amazon Bedrock to expand queries to improve retrieval for legal documents based on specific terminology and citations."}, {"key": "B", "text": "Use Amazon OpenSearch Service to deploy a hybrid search architecture that combines vector search with keyword search. Apply an Amazon Bedrock reranker model to optimize result relevance."}, {"key": "C", "text": "Enable the Amazon Kendra query suggestion feature for end users. Use Amazon Bedrock to perform post-processing of search results to identify semantic similarity in the documents and to produce precise results."}, {"key": "D", "text": "Use Amazon OpenSearch Service with vector search and Amazon Bedrock Titan Embeddings to index and search legal documents. Use custom AWS Lambda functions to merge results with keyword-based filters that are stored in an Amazon RDS database."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B is the correct solution because legal research workloads require both semantic understanding and exact lexical precision, especially for statutes, citations, and domain-specific terminology. A hybrid search architecture directly addresses this need by combining vector similarity search with traditional keyword-based retrieval.\n\nVector search alone is often insufficient for legal research because exact phrases, citation formats, and jurisdiction-specific terms must be matched precisely. Keyword search ensures high recall and precision for citations and legal terms, while vector search captures deeper semantic relationships between legal concepts, precedents, and arguments. Amazon OpenSearch Service natively supports hybrid search, enabling efficient scoring and ranking without external orchestration.\n\nApplying an Amazon Bedrock reranker model further improves relevance by reordering retrieved documents based on deeper contextual understanding. Reranking is especially valuable in legal research because multiple documents may appear relevant, but only a subset truly addresses the user's legal question. The reranker optimizes final results before they are passed to the Anthropic Claude FM, improving answer accuracy and reducing hallucinations.\n\nOption A relies on default vector search, which does not reliably handle citations and exact terminology. Option C focuses on query suggestions and post-processing rather than retrieval quality. Option D introduces unnecessary operational complexity by merging results across multiple systems.\n\nTherefore, Option B best meets the requirements for precision, performance, and semantic understanding in a legal research Al assistant.", "source": "112-113"}, {"id": "q0017", "question": "Example Corp provides a personalized video generation service that millions of enterprise customers use. Customers generate marketing videos by submitting prompts to the company's proprietary generative AI (GenAI) model. To improve output relevance and personalization, Example Corp wants to enhance the prompts by using customer-specific context such as product preferences, customer attributes, and business history.\n\nThe customers have strict data governance requirements. The customers must retain full ownership and control over their own data. The customers do not require real-time access. However, semantic accuracy must be high and retrieval latency must remain low to support customer experience use cases.\n\nExample Corp wants to minimize architectural complexity in its integration pattern. Example Corp does not want to deploy and manage services in each customer's environment unless necessary.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Ensure that each customer sets up an Amazon Q Business index that includes the customer's internal data. Ensure that each customer designates Example Corp as a data accessor to allow Example Corp to retrieve relevant content by using a secure API to enrich prompts at runtime."}, {"key": "B", "text": "Use federated search with Model Context Protocol (MCP) by deploying real-time MCP servers for each customer. Retrieve data in real time during prompt generation."}, {"key": "C", "text": "Ensure that each customer configures an Amazon Bedrock knowledge base. Allow cross-account querying so Example Corp can retrieve structured data for prompt augmentation."}, {"key": "D", "text": "Configure Amazon Kendra to crawl customer data sources. Share the resulting indexes across accounts so Example Corp can query each customer's Amazon Kendra index to retrieve augmentation data."}], "answers": ["A"], "answer_display": "A", "explanation_en": "Option A is the correct solution because Amazon Q Business is explicitly designed to provide secure, governed access to enterprise data while preserving customer ownership and control. Each customer maintains their own Amazon Q Business index, which ensures that data never leaves the customer's control boundary unless explicitly shared through approved access mechanisms.\n\nBy designating Example Corp as a data accessor, customers can allow controlled, auditable access to their indexed content through secure APIs. This model satisfies strict data governance requirements, including data ownership, access transparency, and revocation capability. Customers do not need to expose raw data or deploy infrastructure in Example Corp's environment.\n\nAmazon Q Business provides high semantic accuracy through managed indexing, ranking, and retrieval optimizations. Because real-time access is not required, this approach avoids the complexity and latency challenges of live federated retrieval while still delivering fast query performance suitable for customer experience use cases.\n\nOption B introduces unnecessary operational complexity by requiring real-time MCP servers per customer. Option C requires customers to manage Amazon Bedrock knowledge bases and enable cross-account access, which increases integration complexity and governance risk. Option D requires shared Amazon Kendra indexes across accounts, which complicates access control and data ownership boundaries.\n\nTherefore, Option A provides the cleanest, lowest-overhead architecture that meets data governance, accuracy, performance, and scalability requirements while minimizing operational burden for both Example Corp and its customers.", "source": "113-114"}, {"id": "q0018", "question": "A company uses Amazon Bedrock to build a Retrieval Augmented Generation (RAG) system. The RAG system uses an Amazon Bedrock Knowledge Bases that is based on an Amazon S3 bucket as the data source for emergency news video content. The system retrieves transcripts, archived reports, and related documents from the S3 bucket.\n\nThe RAG system uses state-of-the-art embedding models and a high-performing retrieval setup. However, users report slow responses and irrelevant results, which cause decreased user satisfaction. The company notices that vector searches are evaluating too many documents across too many content types and over long periods of time.\n\nThe company determines that the underlying models will not benefit from additional fine-tuning. The company must improve retrieval accuracy by applying smarter constraints and wants a solution that requires minimal changes to the existing architecture.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Enhance embeddings by using a domain-adapted model that is specifically trained on emergency news content for improved vector similarity."}, {"key": "B", "text": "Migrate to Amazon OpenSearch Service. Use vector fields and metadata filters to define the scope of results retrieval."}, {"key": "C", "text": "Enable metadata-aware filtering within the Amazon Bedrock knowledge base by indexing S3 object metadata."}, {"key": "D", "text": "Migrate to an Amazon Q Business index to perform structured metadata filtering and document categorization during retrieval."}], "answers": ["C"], "answer_display": "C", "explanation_en": "Option C is the correct solution because it directly addresses the root cause of the problem overly broad retrieval-while requiring minimal architectural change. Amazon Bedrock Knowledge Bases support metadata-aware filtering, which allows the system to constrain retrieval queries based on indexed metadata such as content type, publication date, source, or category.\n\nBy indexing Amazon S3 object metadata, the company can restrict vector searches to relevant subsets of the corpus, such as recent emergency reports, specific content formats, or trusted sources. This significantly reduces the number of documents evaluated during retrieval, which improves both latency and result relevance without changing embedding models or retrieval infrastructure.\n\nThis approach aligns with AWS best practices for optimizing RAG systems: when embeddings are already strong, retrieval quality is often improved by narrowing the candidate set rather than increasing model complexity. Metadata filtering reduces noise and ensures that retrieved documents are more contextually aligned with user queries.\n\nOption A requires retraining or adapting embedding models, which the company has already determined will not provide additional benefit. Option B introduces a migration to OpenSearch, which adds operational overhead and deviates from the existing Bedrock knowledge base architecture. Option D requires moving to a different indexing service, increasing complexity and implementation effort.\n\nTherefore, Option C provides the most effective and low-effort solution to improve retrieval accuracy and performance in the existing Amazon Bedrock RAG system.", "source": "114-115"}, {"id": "q0019", "question": "A wildlife conservation agency operates zoos globally. The agency uses various sensors, trackers, and audiovisual recorders to monitor animal behavior. The agency wants to launch a generative AI (GenAI) assistant that can ingest multimodal data to study animal behavior.\n\nThe GenAI assistant must support natural language queries, avoid speculative behavioral interpretations, and maintain audit logs for ethical research audits.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Ingest raw videos into Amazon Rekognition to detect animal postures and expressions. Use Amazon Data Firehose to stream sensor and GPS data into Amazon S3. Prompt an Amazon Bedrock FM using basic templates stored in AWS Systems Manager Parameter Store. Use IAM for access control. Use AWS CloudTrail for audit logging."}, {"key": "B", "text": "Use Amazon SageMaker Processing and Amazon Transcribe to pre-process multimodal data. Ingest curated summaries into an Amazon Bedrock Knowledge Bases. Apply Amazon Bedrock guardrails to restrict speculative outputs. Use AWS AppConfig to manage prompt templates. Use AWS CloudTrail to log research activity for audits."}, {"key": "C", "text": "Use Amazon OpenSearch Serverless to index behavioral logs and telemetry. Use Amazon Comprehend to extract entities. Use Amazon Bedrock to answer questions over indexed data. Use IAM for access control and CloudTrail for audit logging."}, {"key": "D", "text": "Configure Amazon O Business to federate data across Amazon S3, Amazon Kinesis, and Amazon SageMaker Feature Store. Use EventBridge for ingestion orchestration. Use custom AWS Lambda functions to filter LLM outputs for ethical compliance."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B best meets the multimodal, ethical, and auditability requirements using managed AWS services designed for research-grade GenAI systems. Multimodal data such as audio, video, sensor telemetry, and tracking data must be curated and summarized before being consumed by a foundation model. Amazon SageMaker Processing and Amazon Transcribe provide scalable, managed preprocessing for audiovisual and textual data.\n\nBy ingesting summarized, validated observations into Amazon Bedrock Knowledge Bases, the GenAI assistant can answer natural language queries using grounded, evidence-based context instead of raw sensor signals. This significantly reduces the risk of speculative or anthropomorphic interpretations.\n\nAmazon Bedrock guardrails are critical for preventing speculative behavioral claims, enforcing scientific and ethical constraints at inference time. Guardrails provide a validated, auditable safety layer that custom Lambda-based filters cannot reliably replicate.\n\nAWS AppConfig enables controlled prompt management and change governance, ensuring that research prompts remain consistent and reviewable. AWS CloudTrail captures all access, query, and configuration changes, supporting ethical research audits and regulatory reviews.\n\nOption A lacks grounding and speculative safeguards. Option C focuses on text analytics and does not properly handle multimodal reasoning or safety enforcement. Option D relies heavily on custom logic and introduces unnecessary operational risk.\n\nTherefore, Option B provides the most robust, ethical, and auditable GenAl architecture for wildlife behavior research.", "source": "115-116"}, {"id": "q0020", "question": "A company is creating a generative AI (GenAI) application that uses Amazon Bedrock foundation models (FMs). The application must use Microsoft Entra ID to authenticate. All FM API calls must stay on private network paths. Access to the application must be limited by department to specific model families. The company also needs a comprehensive audit trail of model interactions.\n\nWhich solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Configure SAML federation between Microsoft Entra ID and AWS Identity and Access Management. Create department-specific IAM roles that allow only the required Modelld values. Create AWS PrivateLink interface VPC endpoints for Amazon Bedrock runtime services. Enable AWS CloudTrail to capture Amazon Bedrock API calls. Configure Amazon Bedrock model invocation logging to record detailed model interactions."}, {"key": "B", "text": "Create an identity provider (IdP) connection in IAM to authenticate by using Microsoft Entra ID. Assign department permission sets to control access to specific model families. Deploy AWS Lambda functions in private subnets with a NAT gateway for egress to Amazon Bedrock public endpoints. Enable CloudWatch Logs to capture model interactions for auditing purposes."}, {"key": "C", "text": "Create a SAML identity provider (IdP) in IAM to authenticate by using Microsoft Entra ID. Use IAM permissions boundaries to limit department roles' access to specific model families. Configure public Amazon Bedrock API endpoints with VPC routing to maintain private network connectivity. Set up CloudTrail with Amazon S3 Lifecycle rules to manage audit logs of model interactions."}, {"key": "D", "text": "Configure OpenID Connect (OIDC) federation between Microsoft Entra ID and IAM. Use attribute-based access control to map department attributes to specific model access permissions. Apply SCP policies to restrict access to Amazon Bedrock FM families based on department. Use Microsoft Entra ID's built-in logging capabilities to maintain an audit trail of model interactions."}], "answers": ["A"], "answer_display"
