<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIP 刷题原型 Mobile（84题去重版）（84题去重版）</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a30;
      --panel-2: #18223d;
      --text: #eaf0ff;
      --muted: #9fb0d6;
      --accent: #7aa2ff;
      --ok: #2ecc71;
      --bad: #ff6b6b;
      --warn: #ffd166;
      --border: #26345c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: linear-gradient(180deg, #08101f 0%, #0f1730 100%); color: var(--text); }
    .app { max-width: 980px; margin: 0 auto; padding: 24px 16px 64px; }
    .header { display: grid; gap: 14px; margin-bottom: 18px; }
    .title { font-size: 28px; font-weight: 800; letter-spacing: .2px; }
    .subtitle { color: var(--muted); line-height: 1.5; }
    .topbar { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; }
    .card { background: rgba(18,26,48,.95); border: 1px solid var(--border); border-radius: 18px; padding: 14px 16px; box-shadow: 0 12px 30px rgba(0,0,0,.22); }
    .stat-label { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: 800; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 18px 0; }
    button { appearance: none; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); border-radius: 12px; padding: 10px 14px; font-size: 14px; cursor: pointer; }
    button.primary { background: var(--accent); color: #091223; border-color: transparent; font-weight: 700; }
    button.ghost { background: transparent; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .pill { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(122,162,255,.12); color: #cfe0ff; border: 1px solid rgba(122,162,255,.28); font-size: 13px; }
    .question-card { display: grid; gap: 16px; }
    .meta { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; color: var(--muted); font-size: 13px; }
    .question-text { white-space: pre-wrap; line-height: 1.7; font-size: 17px; }
    .options { display: grid; gap: 12px; }
    label.option { display: grid; grid-template-columns: 28px 1fr; gap: 12px; align-items: start; background: #10182d; border: 1px solid var(--border); border-radius: 16px; padding: 14px; cursor: pointer; }
    label.option.selected { border-color: var(--accent); background: rgba(122,162,255,.1); }
    label.option.correct { border-color: rgba(46,204,113,.65); background: rgba(46,204,113,.12); }
    label.option.incorrect { border-color: rgba(255,107,107,.7); background: rgba(255,107,107,.12); }
    .opt-key { font-weight: 800; color: #cfe0ff; padding-top: 2px; }
    .opt-text { white-space: pre-wrap; line-height: 1.65; color: #edf2ff; }
    input[type="radio"], input[type="checkbox"] { margin-top: 3px; }
    .result { display: none; gap: 12px; margin-top: 8px; }
    .result.show { display: grid; }
    .banner { padding: 14px 16px; border-radius: 14px; font-weight: 700; }
    .banner.ok { background: rgba(46,204,113,.14); border: 1px solid rgba(46,204,113,.45); color: #bdf0cf; }
    .banner.bad { background: rgba(255,107,107,.14); border: 1px solid rgba(255,107,107,.45); color: #ffd4d4; }
    .explanation { white-space: pre-wrap; line-height: 1.7; color: #eef3ff; background: #10182d; border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
    .small { color: var(--muted); font-size: 13px; }
    .footer-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .empty { color: var(--muted); padding: 24px 0; text-align: center; }
    .progressbar { height: 10px; background: #0d1430; border-radius: 999px; overflow: hidden; border: 1px solid var(--border); }
    .progressbar > div { height: 100%; background: linear-gradient(90deg, #7aa2ff 0%, #9fb7ff 100%); width: 0%; transition: width .2s ease; }
    .mode-active { outline: 2px solid rgba(122,162,255,.55); }
    @media (max-width: 760px) { .topbar { grid-template-columns: repeat(2, minmax(0,1fr)); } .title { font-size: 24px; } }
  

    @media (max-width: 900px) {
      body { font-size: 17px; }
      .app { padding: 10px; }
      .topbar, .panel, .card, .question-card { border-radius: 18px !important; }
      .topbar { position: sticky; top: 0; z-index: 30; backdrop-filter: blur(10px); }
      .title { font-size: 1.15rem !important; line-height: 1.3; }
      .subtitle, .muted, .meta, .progress-text { font-size: 0.95rem !important; }
      .toolbar, .actions, .mode-switch, .stats-grid { gap: 10px !important; }
      button, .btn, .chip, .mode-btn { min-height: 48px; padding: 12px 14px !important; font-size: 1rem !important; border-radius: 14px !important; }
      label.option, .option, .choice, .answer-option { padding: 14px 14px !important; min-height: 54px; border-radius: 16px !important; }
      input[type="radio"], input[type="checkbox"] { width: 20px; height: 20px; }
      .question-text { font-size: 1.05rem !important; line-height: 1.65 !important; }
      .explanation, .result-panel { font-size: 0.98rem !important; line-height: 1.65 !important; }
      .stats-grid { grid-template-columns: 1fr 1fr !important; }
      .footer-actions, .bottom-actions { position: sticky; bottom: 0; background: rgba(11,16,32,0.92); padding-top: 8px; }
    }

    @media (max-width: 600px) {
      .app { padding: 8px; }
      .topbar, .panel, .card, .question-card { padding: 14px !important; }
      .stats-grid { grid-template-columns: 1fr !important; }
      .toolbar, .actions, .mode-switch, .bottom-actions, .footer-actions { display: grid !important; grid-template-columns: 1fr 1fr; }
      .toolbar > *, .actions > *, .mode-switch > *, .bottom-actions > *, .footer-actions > * { width: 100%; }
      .question-text { font-size: 1rem !important; }
    }

  </style>

<body>
  <div class="app">
    <div class="header">
      <div class="title">AWS AIP 刷题原型</div>
      <div class="subtitle">基于你清洗后的题库制作。支持随机刷题、单选/多选判题、英文解析、错题本、本地统计持久化，以及断点续刷。</div>
    </div>

    <div class="topbar">
      <div class="card"><div class="stat-label">题库总数</div><div class="stat-value" id="statTotal">0</div></div>
      <div class="card"><div class="stat-label">当前轮进度</div><div class="stat-value" id="statProgress">0 / 0</div></div>
      <div class="card"><div class="stat-label">当前轮正确率</div><div class="stat-value" id="statAccuracy">0%</div></div>
      <div class="card"><div class="stat-label">累计错题数</div><div class="stat-value" id="statWrongBook">0</div></div>
    </div>

    <div class="toolbar">
      <button id="modeAllBtn" class="primary mode-active">随机全量模式</button>
      <button id="modeWrongBtn">错题本模式</button>
      <button id="restartBtn" class="ghost">重新洗牌本轮</button>
      <button id="resetProgressBtn" class="ghost">重置本轮进度</button>
      <button id="resetStatsBtn" class="ghost">清空本地统计</button>
      <span class="pill" id="modePill">当前模式：随机全量</span>
      <span class="pill" id="resumePill">进度：自动保存中</span>
    </div>

    <div class="card" style="margin-bottom:18px;">
      <div class="small" style="margin-bottom:8px;">本轮进度</div>
      <div class="progressbar"><div id="progressFill"></div></div>
    </div>

    <div id="questionWrap" class="card question-card"></div>
  </div>

  <script>
    const QUESTIONS = [{"id": "q0001", "question": "A financial services company is developing a real-time generative AI (GenAI) assistant to support human call center agents. The GenAI assistant must transcribe live customer speech, analyze context, and provide incremental suggestions to call center agents while a customer is still speaking. To preserve responsiveness, the GenAI assistant must maintain end-to-end latency under 1 second from speech to initial response display. The architecture must use only managed AWS services and must support bidirectional streaming to ensure that call center agents receive updates in real time.
Which solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Use Amazon Transcribe streaming to transcribe calls. Pass the text to Amazon Comprehend for sentiment analysis. Feed the results to Anthropic Claude on Amazon Bedrock by using the InvokeModel API. Store results in Amazon DynamoDB. Use a WebSocket API to display the results."}, {"key": "B", "text": "Use Amazon Transcribe streaming with partial results enabled to deliver fragments of transcribed text before customers finish speaking. Forward text fragments to Amazon Bedrock by using the InvokeModel WithResponseStream API. Stream responses to call center agents through an Amazon API Gateway WebSocket API."}, {"key": "C", "text": "Use Amazon Transcribe batch processing to convert calls to text. Pass complete transcripts to Anthropic Claude on Amazon Bedrock by using the ConverseStream API. Return responses through an Amazon Lex chatbot interface."}, {"key": "D", "text": "Use the Amazon Transcribe streaming API with an AWS Lambda function to transcribe each audio segment. Call the Amazon Titan Embeddings model on Amazon Bedrock by using the InvokeModel API. Publish results to Amazon SNS."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B is the only solution that satisfies all strict real-time, streaming, and latency requirements. Amazon Transcribe streaming with partial results allows transcription fragments to be delivered before the speaker finishes a sentence. This significantly reduces perceived latency and enables downstream processing to begin immediately, which is essential for maintaining sub-1-second end-to-end response times.
Using Amazon Bedrock's InvokeModel WithResponseStream API enables token-level or chunk-level streaming responses from the foundation model. This allows the GenAI assistant to begin delivering suggestions to call center agents incrementally instead of waiting for a full model response. This streaming inference capability is critical for interactive, real-time agent assistance use cases.
Amazon API Gateway WebSocket APIs provide fully managed, bidirectional communication between backend services and agent dashboards. This ensures that updates flow continuously to agents as new transcription fragments and model outputs become available, preserving real-time responsiveness without requiring custom socket infrastructure.
Option A introduces additional synchronous processing layers and storage writes that increase latency. Option C uses batch transcription and post-call processing, which cannot meet real-time requirements. Option D uses embeddings and asynchronous messaging, which are not suitable for live incremental suggestions and bidirectional streaming.
Therefore, Option B best aligns with AWS real-time GenAI architecture patterns by combining streaming transcription, streaming model inference, and managed bidirectional communication while maintaining low latency and operational simplicity.", "source": "1-2"}, {"id": "q0002", "question": "A company runs a Retrieval Augmented Generation (RAG) application that uses Amazon Bedrock Knowledge Bases to perform regulatory compliance queries. The application uses the RetrieveAndGenerateStream API. The application retrieves relevant documents from a knowledge base that contains more than 50,000 regulatory documents, legal precedents, and policy updates.
The RAG application is producing suboptimal responses because the initial retrieval often returns semantically similar but contextually irrelevant documents. The poor responses are causing model hallucinations and incorrect regulatory guidance. The company needs to improve the performance of the RAG application so it returns more relevant documents.
Which solution will meet this requirement with the LEAST operational overhead?", "question_type": "single", "options": [{"key": "A", "text": "Deploy an Amazon SageMaker endpoint to run a fine-tuned ranking model. Use an Amazon API Gateway REST API to route requests. Configure the application to make requests through the REST API to rerank the results."}, {"key": "B", "text": "Use Amazon Comprehend to classify documents and apply relevance scores. Integrate the RAG application's reranking process with Amazon Textract to run document analysis. Use Amazon Neptune to perform graph-based relevance calculations."}, {"key": "C", "text": "Implement a retrieval pipeline that uses the Amazon Bedrock Knowledge Bases Retrieve API to perform initial document retrieval. Call the Amazon Bedrock Rerank API to rerank the results. Invoke the InvokeModelWithResponseStream operation to generate responses."}, {"key": "D", "text": "Use the latest Amazon reranker model through the reranking configuration within Amazon Bedrock Knowledge Bases. Use the model to improve document relevance scoring and to reorder results based on contextual assessments."}], "answers": ["D"], "answer_display": "D", "explanation_en": "Option D is the correct solution because Amazon Bedrock Knowledge Bases natively support reranking by using Amazon-managed reranker models, which are specifically designed to improve contextual relevance after the initial vector retrieval step. This approach directly addresses the root cause of the issue: semantically similar but contextually irrelevant documents being passed to the foundation model.
By enabling the reranking configuration within Amazon Bedrock Knowledge Bases, the application can automatically reorder retrieved documents based on deeper contextual understanding, such as regulatory scope, legal applicability, and semantic intent. This significantly improves retrieval precision, which reduces hallucinations and improves the factual accuracy of generated regulatory guidance.
Option D requires no additional infrastructure, no custom orchestration logic, and no separate model hosting. The reranking is fully managed by Amazon Bedrock and integrates seamlessly with the existing RetrieveAndGenerateStream workflow. This makes it the lowest operational overhead solution.
Option A introduces operational complexity by requiring a custom SageMaker endpoint, API Gateway routing, and model lifecycle management. Option B combines multiple unrelated services and introduces significant complexity without being purpose-built for RAG relevance ranking. Option C improves relevance but requires explicitly calling the Rerank API and modifying the application pipeline, which increases operational and integration effort compared to built-in reranking.
Therefore, Option D provides the most efficient, scalable, and AWS-recommended method to improve RAG retrieval quality while minimizing operational burden.", "source": "2-3"}, {"id": "q0003", "question": "A company is building an Al advisory application by using Amazon Bedrock. The application will provide recommendations to customers. The company needs the application to explain its reasoning process and cite specific sources for data. The application must retrieve information from company data sources and show step-by-step reasoning for recommendations. The application must also link data claims to source documents and maintain response latency under 3 seconds.
Which solution will meet these requirements with the LEAST operational overhead?", "question_type": "single", "options": [{"key": "A", "text": "Use Amazon Bedrock Knowledge Bases with source attribution enabled. Use the Anthropic Claude Messages API with RAG to set high-relevance thresholds for source documents. Store reasoning and citations in Amazon S3 for auditing purposes."}, {"key": "B", "text": "Use Amazon Bedrock with Anthropic Claude models and extended thinking. Configure a 4,000-token thinking budget. Store reasoning traces and citations in Amazon DynamoDB for auditing purposes."}, {"key": "C", "text": "Configure Amazon SageMaker Al with a custom Anthropic Claude model. Use the model's reasoning parameter and AWS Lambda to process responses. Add source citations from a separate Amazon RDS database."}, {"key": "D", "text": "Use Amazon Bedrock with Anthropic Claude models and chain-of-thought reasoning. Configure custom retrieval tracking with the Amazon Bedrock Knowledge Bases API. Use Amazon CloudWatch to monitor response latency metrics."}], "answers": ["A"], "answer_display": "A", "explanation_en": "Option A is the best solution because it natively delivers retrieval grounding, source attribution, and low operational overhead through Amazon Bedrock Knowledge Bases. The key requirements are: retrieve from company data sources, cite sources, link claims to source documents, and keep latency under 3 seconds.
Knowledge Bases are a managed RAG capability that handles document ingestion, chunking, embeddings, retrieval, and assembly of context for model generation. This eliminates the need to build and maintain custom retrieval infrastructure.
Source attribution is crucial: the application must \"link data claims to source documents.\" When source attribution is enabled, the RAG pipeline can return references to the underlying documents and segments used for generation. This enables traceable citations that can be surfaced to end users and used for internal auditing.
Using the Anthropic Claude Messages API (or equivalent conversational interface) with RAG allows the application to generate recommendations grounded in retrieved context while keeping responses conversational. Setting relevance thresholds helps reduce noisy retrieval, which supports both accuracy and latency targets by limiting the context passed to the model.
Storing reasoning and citations in Amazon S3 supports audit and retention needs with minimal operational burden. While the prompt may request step-by-step reasoning, AWS best practice is to produce user-facing explanations that are faithful and attributable without exposing internal reasoning traces unnecessarily. With source-grounded outputs, the system can provide concise rationale tied to citations while maintaining fast response times.
Option B emphasizes extended thinking, which increases latency and does not ensure source linkage. Option C adds significant operational overhead through custom model hosting and separate citation systems. Option D requires more custom tracking work than A while not improving retrieval attribution beyond what Knowledge Bases already provide.
Therefore, Option A best meets the requirements with the least operational overhead.", "source": "3-4"}, {"id": "q0004", "question": "An ecommerce company operates a global product recommendation system that needs to switch between multiple foundation models (FMs) in Amazon Bedrock based on regulations, cost optimization, and performance requirements. The company must apply custom controls based on proprietary business logic, including dynamic cost thresholds, AWS Region-specific compliance rules, and real-time A/B testing across multiple FMs. The system must be able to switch between FMs without deploying new code. The system must route user requests based on complex rules including user tier, transaction value, regulatory zone, and real-time cost metrics that change hourly and require immediate propagation across thousands of concurrent requests.
Which solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Deploy an AWS Lambda function that uses environment variables to store routing rules and Amazon Bedrock FM IDs. Use the Lambda console to update the environment variables when business requirements change. Configure an Amazon API Gateway REST API to read request parameters to make routing decisions."}, {"key": "B", "text": "Deploy Amazon API Gateway REST API request transformation templates to implement routing logic based on request attributes. Store Amazon Bedrock FM endpoints as REST API stage variables. Update the variables when the system switches between models."}, {"key": "C", "text": "Configure an AWS Lambda function to fetch routing configuration from the AWS AppConfig Agent for each user request. Run business logic in the Lambda function to select the appropriate FM for each request. Expose the FM through a single Amazon API Gateway REST API endpoint."}, {"key": "D", "text": "Use AWS Lambda authorizers for an Amazon API Gateway REST API to evaluate routing rules that are stored in AWS AppConfig. Return authorization contexts based on business logic. Route requests to model-specific Lambda functions for each Amazon Bedrock FM."}], "answers": ["C"], "answer_display": "C", "explanation_en": "Option C best satisfies the requirement to change routing decisions without redeploying code while supporting complex, frequently changing business logic at scale. AWS AppConfig is designed for centrally managing dynamic configuration (feature flags, rules, thresholds, and policy parameters) and deploying changes safely. It supports controlled deployments, validation, and rapid propagation of updated configuration values, which aligns with \"real-time cost metrics that change hourly\" and the need for \"immediate propagation across thousands of concurrent requests.\"
In this design, the Lambda function becomes the policy decision point. For each request, it evaluates user attributes (tier, transaction value), context (regulatory zone, Region), and live cost/performance thresholds stored in AppConfig to determine which Amazon Bedrock FM to invoke. Because the routing rules and FM identifiers are delivered as configuration, the company can switch models, adjust A/B testing weights, or update compliance routing rules by deploying new AppConfig configuration versions rather than pushing new application code. This reduces operational risk and accelerates iteration.
Exposing a single API Gateway endpoint also minimizes client complexity and keeps routing logic server-side, which is important when rules change frequently. Lambda can cache configuration between invocations (within the execution environment) to reduce repeated fetch overhead while still picking up changes quickly, enabling both low latency and rapid rule rollout under high concurrency.
Option A relies on Lambda environment variables, which are not intended for frequent real-time updates and typically require function configuration updates that are slower and operationally brittle. Option B uses mapping templates and stage variables, which are limited for complex rule evaluation and safe rollout patterns. Option D misuses authorizers for business routing, adds extra latency and complexity, and complicates observability and error handling by splitting decisioning from execution.", "source": "4-5"}, {"id": "q0005", "question": "A media company is launching a platform that allows thousands of users every hour to upload images and text content. The platform uses Amazon Bedrock to process the uploaded content to generate creative compositions.
The company needs a solution to ensure that the platform does not process or produce inappropriate content. The platform must not expose personally identifiable information (PII) in the compositions. The solution must integrate with the company's existing Amazon S3 storage workflow.
Which solution will meet these requirements with the LEAST infrastructure management overhead?", "question_type": "single", "options": [{"key": "A", "text": "Enable the Enhanced Monitoring tool. Use an Amazon CloudWatch alarm to filter traffic to the platform. Use Amazon Comprehend PII detection to pre-process the data. Create a CloudWatch alarm to monitor for Amazon Comprehend PII detection events. Create an AWS Step Functions workflow that includes an Amazon Rekognition image moderation step."}, {"key": "B", "text": "Use an Amazon API Gateway HTTP API with request validation templates to screen content before storing the uploaded content in Amazon S3. Use Amazon SageMaker AI to build custom content moderation models that process content before sending the processed content to Amazon Bedrock."}, {"key": "C", "text": "Create an Amazon Cognito user pool that uses pre-authentication AWS Lambda functions to run content moderation checks. Use Amazon Textract to filter text content and Amazon Rekognition to filter image content before allowing users to upload content to the platform."}, {"key": "D", "text": "Create an AWS Step Functions workflow that uses built-in Amazon Bedrock guardrails to filter content. Use Amazon Comprehend PII detection to pre-process the content. Use Amazon Rekognition image moderation."}], "answers": ["D"], "answer_display": "D", "explanation_en": "Option D is the correct solution because it relies primarily on managed, purpose-built AWS services and minimizes custom infrastructure and model management. Amazon Bedrock guardrails provide native, configurable content safety controls that can block or redact disallowed content before or after model inference. This directly ensures that the platform does not process or produce inappropriate outputs while maintaining low operational overhead.
Using Amazon Comprehend PII detection as a preprocessing step integrates cleanly with an Amazon S3-based ingestion workflow. Comprehend is a fully managed service that detects and optionally redacts PII in text without requiring custom models or pipelines. This ensures that sensitive information is removed before content is passed to Amazon Bedrock for generation.
Amazon Rekognition image moderation is purpose-built for detecting unsafe or inappropriate visual content and integrates naturally into Step Functions workflows. Step Functions provides orchestration without requiring servers or long-running infrastructure, allowing the company to integrate text and image moderation steps in a clear, auditable pipeline.
Option A introduces redundant monitoring logic and alarms that do not directly enforce content safety. Option B requires building and maintaining custom SageMaker models, increasing complexity and operational burden. Option C applies moderation at authentication time and uses services like Textract that are not designed for content moderation, increasing latency and management overhead.
Therefore, Option D best satisfies content safety, PII protection, S3 integration, and minimal infrastructure management requirements.", "source": "5-6"}, {"id": "q0006", "question": "A company uses an organization in AWS Organizations with all features enabled to manage multiple AWS accounts. Employees use Amazon Bedrock across multiple accounts. The company must prevent specific topics and proprietary information from being included in prompts to Amazon Bedrock models. The company must ensure that employees can use only approved Amazon Bedrock models. The company wants to manage these controls centrally.
Which combination of solutions will meet these requirements? (Select TWO.)", "question_type": "multiple", "options": [{"key": "A", "text": "Create an IAM permissions boundary for each employee's IAM role. Configure the permissions boundary to require an approved Amazon Bedrock guardrail identifier to invoke Amazon Bedrock models. Create an SCP that allows employees to use only approved models."}, {"key": "B", "text": "Create an SCP that allows employees to use only approved models. Configure the SCP to require employees to specify a guardrail identifier in calls to invoke an approved model."}, {"key": "C", "text": "Create an SCP that prevents an employee from invoking a model if a centrally deployed guardrail identifier is not specified in a call to the model. Create a permissions boundary on each employee's IAM role that allows each employee to invoke only approved models."}, {"key": "D", "text": "Use AWS CloudFormation to create a custom Amazon Bedrock guardrail that has a block filtering policy. Use stack sets to deploy the guardrail to each account in the organization."}, {"key": "E", "text": "Use AWS CloudFormation to create a custom Amazon Bedrock guardrail that has a mask filtering policy. Use stack sets to deploy the guardrail to each account in the organization."}], "answers": ["C", "D"], "answer_display": "CD", "explanation_en": "The correct combination is C and D because together they enforce centralized governance over both model access and prompt content controls, which are the two core requirements of the scenario.
To ensure employees can use only approved Amazon Bedrock models, governance must be enforced at the organization level and not rely on individual application logic. Service Control Policies (SCPs) are the strongest control mechanism available in AWS Organizations because they define the maximum permissions an account or principal can have. In option C, the SCP prevents any Amazon Bedrock model invocation unless a centrally approved guardrail identifier is specified. This ensures that guardrails are always enforced, regardless of how or where the invocation originates. The additional use of IAM permissions boundaries ensures that even within allowed accounts, employees are restricted to invoking only explicitly approved foundation models.
To prevent specific topics and proprietary information from being included in prompts, Amazon Bedrock Guardrails must be used. Guardrails operate inline during model invocation and can block disallowed content before it is processed by the model. Option D correctly specifies a block filtering policy, which is appropriate when content must be prevented entirely rather than partially redacted. Deploying the guardrail using AWS CloudFormation StackSets allows the company to centrally manage and consistently deploy the same guardrail configuration across all accounts in the organization, ensuring uniform enforcement.
Option E uses mask filtering, which is better suited for redacting sensitive output rather than preventing prohibited content from being submitted in prompts. Option B attempts to use SCPs alone but does not enforce guardrail deployment or content filtering. Option A incorrectly places guardrail enforcement in permissions boundaries, which are not designed to validate request parameters such as guardrail identifiers.
By combining SCP-based enforcement with centrally deployed Bedrock guardrails, options C and D together provide strong, scalable, and centrally managed controls for both content safety and model governance across the organization.", "source": "8-9"}, {"id": "q0007", "question": "A hotel company wants to enhance a legacy Java-based property management system (PMS) by adding AI capabilities. The company wants to use Amazon Bedrock Knowledge Bases to provide staff with room availability information and hotel-specific details. The solution must maintain separate access controls for each hotel that the company manages. The solution must provide room availability information in near real time and must maintain consistent performance during peak usage periods.
Which solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Deploy a single Amazon Bedrock knowledge base that contains combined data for all hotels. Configure AWS Lambda functions to synchronize data from each hotel's PMS database through direct API connections. Implement AWS CloudTrail logging with hotel-specific filters to audit access logs for each hotel's data."}, {"key": "B", "text": "Create an Amazon EventBridge rule for each hotel that is invoked by changes to the PMS database. Configure the rule to send updates to a centralized Amazon Bedrock knowledge base in a management AWS account. Configure resource-based policies to enforce hotel-specific access controls."}, {"key": "C", "text": "Implement one Amazon Bedrock knowledge base for each hotel in a multi-account structure. Use direct data ingestion to provide near real-time room availability information. Schedule regular synchronization for less critical information."}, {"key": "D", "text": "Build a centralized Amazon Bedrock Agents solution that uses multiple knowledge bases. Implement AWS IAM Identity Center with hotel-specific permission sets to control staff access."}], "answers": ["C"], "answer_display": "C", "explanation_en": "Option C best meets the requirements by aligning with AWS best practices for data isolation, access control, and scalable GenAI retrieval. Implementing a separate Amazon Bedrock knowledge base for each hotel ensures strict separation of data and permissions. This approach naturally enforces hotel-level access control without requiring complex policy logic or post-query filtering.
A multi-account structure further strengthens security and governance by isolating each hotel's data plane. AWS recommends account-level isolation for workloads with strong tenancy or compliance boundaries. Hotel staff can be granted access only to their hotel's account and corresponding knowledge base, eliminating the risk of cross-hotel data exposure.
Direct data ingestion into each knowledge base enables near real-time updates for critical data such as room availability. For information that does not change frequently, scheduled synchronization reduces ingestion cost while maintaining accuracy. This hybrid ingestion model balances freshness and operational efficiency.
Because Amazon Bedrock Knowledge Bases are fully managed, performance remains consistent during peak usage periods without the company managing indexing, scaling, or retrieval infrastructure. Each knowledge base scales independently, preventing noisy-neighbor issues that could arise in a centralized design.

ntent, where user prompts are often descriptive and do not map cleanly to keyword filters.

cal terminology from authoritative documents to reduce ambiguity and improve factual accuracy.

nowledge base, the application does not need to implement and operate separate services to (1) generate embeddings for hundreds of millions of records, (2) store and manage vectors, (3) build query-time embedding conversion logic, and (4) implement k-NN search orchestration. Instead, the knowledge base is configured to automatically create embeddings during ingestion, and the application queries it using the Amazon Bedrock Retrieve API, which accepts natural language input and performs the vector search as a managed capability.

Which solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Configure the knowledge base to use fixed-size chunking. Set a 300-token maximum chunk size and a 10% overlap between chunks. Use an appropriate Amazon Bedrock embedding model."}, {"key": "B", "text": "Configure the knowledge base to use hierarchical chunking. Use parent chunks that contain 1,000 tokens and child chunks that contain 200 tokens. Set a 50-token overlap between chunks."}, {"key": "C", "text": "Configure the knowledge base to use semantic chunking. Use a buffer size of 1 and a breakpoint percentile threshold of 85% to determine chunk boundaries based on content meaning."}, {"key": "D", "text": "Configure the knowledge base not to use chunking. Manually split each document into separate files before ingestion. Apply post-processing reranking during retrieval."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B is the best fit because hierarchical chunking is designed to preserve local detail while keeping broader document context available during retrieval, which directly addresses the problem of questions spanning methodology, results, and discussion. In large scientific papers, a single answer often depends on linked paragraphs across adjacent sections. If the knowledge base retrieves only small, isolated chunks, the RAG system can cite text that is semantically close to a query term but not contextually correct, producing inconsistent answers and irrelevant citations.
With hierarchical chunking, the knowledge base creates child chunks that are small enough for high-precision vector similarity matching, such as 200 tokens, which improves the likelihood that the retrieved text is tightly related to the user's query. At the same time, each child chunk is associated with a larger parent chunk, such as 1,000 tokens, which retains the surrounding narrative and section-level context. This structure helps the retrieval pipeline return passages that include the relevant subsection plus the explanatory framing that prevents misinterpretation, which is especially important in scientific writing where methods, results, and discussion are interdependent.

Which solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Configure AWS Lambda functions that call Amazon Bedrock FMs for all routing logic. Use conditional statements to determine the appropriate FM based on content type and semantics."}, {"key": "B", "text": "Create a hybrid solution. Handle simple routing based on file extensions in application code. Handle complex content-based routing by using an AWS Step Functions state machine with JSONata for content analysis and the InvokeModel API for specialized FMs."}, {"key": "C", "text": "Deploy separate AWS Step Functions workflows for each content type with routing logic in AWS Lambda functions. Use Amazon EventBridge to coordinate between workflows when fallback to alternate FMs is required."}, {"key": "D", "text": "Use Amazon SQS with different SQS queues for each content type. Configure AWS Lambda consumers that analyze content and invoke appropriate FMs based on message attributes by using Amazon Bedrock with an AWS SDK."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B is the most appropriate solution because it directly aligns with AWS-recommended architectural patterns for building scalable, observable, and resilient generative AI applications on Amazon Bedrock. The requirements clearly distinguish between simple and complex routing decisions, and this option addresses both in an optimal way.
Simple routing based on file extension is latency sensitive. Handling this logic directly in the application code avoids unnecessary orchestration, state transitions, and service calls. This approach ensures that straightforward requests, such as routing images to vision-capable foundation models or text files to language models, are processed with minimal overhead and maximum performance.
For complex routing based on content semantics, AWS Step Functions is specifically designed for multi-step workflows that require analysis, branching logic, and error handling. Semantic routing often requires inspecting meaning, intent, or structure before selecting the appropriate foundation model. Step Functions enables this by orchestrating analysis steps and applying conditional logic to determine the correct model to invoke using the Amazon Bedrock InvokeModel API.

es company uses an Al application to process financial documents by using Amazon Bedrock. During business hours, the application handles approximately 10,000 requests each hour, which requires consistent throughput. The company uses the CreateProvisionedModelThroughput API to purchase provisioned throughput. Amazon CloudWatch metrics show that the provisioned capacity is unused while on-demand requests are being throttled. The company finds the following code in the application:

The company needs the application to use the provisioned throughput and to resolve the throttling issues. Which solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Increase the number of model units (MUs) in the provisioned throughput configuration."}, {"key": "B", "text": "Replace the model ID parameter with the ARN of the provisioned model that the CreateProvisionedModelThroughput API returns."}, {"key": "C", "text": "Add exponential backoff retry logic to handle throttling exceptions during peak hours."}, {"key": "D", "text": "Modify the application to use the invokeModel WithResponseStream API instead of the invokeModel API."}], "answers": ["B"], "answer_display": "B", "explanation_en": "Option B is the correct solution because Amazon Bedrock provisioned throughput is only used when the application explicitly invokes the provisioned model ARN, not the base foundation model ID. In the provided code, the application is calling the standard model identifier (anthropic.claude-v2), which routes requests to on-demand capacity instead of the purchased provisioned throughput. When the Create Provisioned Model Throughput API is used, Amazon Bedrock returns a provisioned model ARN that represents the reserved capacity. Applications must reference this ARN in the modelId parameter when invoking the model. If the base model ID is used instead, Bedrock treats the request as on-demand traffic, which explains why CloudWatch metrics show unused provisioned capacity alongside throttled on-demand requests. Option A would increase capacity but would not fix the root cause because the application is not using the provisioned resource at all. Option C adds resiliency but does not ensure usage of provisioned throughput and would still incur throttling. Option D changes the response delivery mechanism but does not affect capacity routing. Therefore, Option B directly resolves the throttling issue by correctly routing traffic to the reserved capacity and ensures that the company benefits from the provisioned throughput it has purchased.", "source": "104-105"}, {"id": "q0092", "question": "A financial services company uses multiple foundation models (FMs) through Amazon Bedrock for its generative AI (GenAI) applications. To comply with a new regulation for GenAI use with sensitive financial data, the company needs a token management solution. The token management solution must proactively alert when applications approach model-specific token limits. The solution must also process more than 5,000 requests each minute and maintain token usage metrics to allocate costs across business units. Which solution will meet these requirements?", "question_type": "single", "options": [{"key": "A", "text": "Develop model-specific tokenizers in an AWS Lambda function. Configure the Lambda function to estimate token usage before sending requests to Amazon Bedrock. Configure the Lambda function to publish metrics to Amazon CloudWatch and trigger alarms when requests approach thresholds. Store detailed token usage in Amazon DynamoDB to report costs."}, {"key": "B", "text": "Implement Amazon Bedrock Guardrails with token quota policies. Capture metrics on rejected requests. Configure Amazon EventBridge rules to trigger notifications based on Amazon Bedrock Guardrails metrics. Use Amazon CloudWatch dashboards to visualize token usage trends across models."}, {"key": "C", "text": "Deploy an Amazon SQS dead-letter queue for failed requests. Configure an AWS Lambda function to analyze token-related failures. Use Amazon CloudWatch Logs Insights to generate reports on token usage patterns based on error logs from Amazon Bedrock API responses."}, {"key": "D", "text": "Use Amazon API Gateway to create a proxy for all Amazon Bedrock API calls. Configure request throttling based on custom usage plans with predefined token quotas. Configure API Gateway to reject requests that will exceed token limits."}], "answers": ["A"], "answer_display": "A", "explanation_en": "Option A is the correct solution because it provides proactive, model-aware token management with fine-grained visibility and alerting, which is required for regulated financial workloads. Amazon Bedrock currently exposes token usage metrics after invocation, but it does not natively enforce proactive, model-specific token limits across multiple applications or business units. By implementing model-specific tokenizers in AWS Lambda, the company can estimate input and output token usage before sending requests to Amazon Bedrock. This enables early detection of requests that are approaching or exceeding model limits and allows the application to block, truncate, or reroute requests proactively rather than reacting to failures. Publishing token usage metrics to Amazon CloudWatch enables real-time monitoring and alerting at scale, easily supporting more than 5,000 requests per minute. Storing detailed token usage data in Amazon DynamoDB allows the company to attribute usage and costs to specific applications, teams, or business units an essential requirement for regulatory reporting and internal chargeback. Option B is incorrect because Amazon Bedrock Guardrails do not currently provide token quota enforcement or proactive token alerts. Option C is reactive and only analyzes failures after they occur. Option D throttles requests but cannot enforce token-based limits or provide per-model cost attribution. Therefore, Option A best satisfies proactive alerting, scalability, compliance reporting, and cost allocation requirements with acceptable operational effort.", "source": "108-109"}];

    const STORAGE_KEY = 'aip_quiz_mobile_stats_dedup84_v1';
    const PROGRESS_KEY = 'aip_quiz_mobile_progress_dedup84_v1';
    const QUESTIONS_SIGNATURE = `${QUESTIONS.length}:${QUESTIONS[0]?.id || ''}:${QUESTIONS[QUESTIONS.length - 1]?.id || ''}`;

    const state = {
      mode: 'all',
      order: [],
      index: 0,
      submitted: false,
      session: { answered: 0, correct: 0, wrong: 0 },
      stats: loadStats(),
      currentSelection: new Set(),
      restored: false,
    };

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function loadStats() {
      const empty = { byId: {}, wrongBook: [] };
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return empty;
        const parsed = JSON.parse(raw);
        if (!parsed.byId) parsed.byId = {};
        if (!Array.isArray(parsed.wrongBook)) parsed.wrongBook = [];
        return parsed;
      } catch {
        return empty;
      }
    }

    function saveStats() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.stats));
    }

    function saveProgress() {
      const payload = {
        signature: QUESTIONS_SIGNATURE,
        mode: state.mode,
        order: state.order,
        index: state.index,
        submitted: state.submitted,
        session: state.session,
        currentSelection: [...state.currentSelection],
        savedAt: new Date().toISOString(),
      };
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(payload));
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(PROGRESS_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (parsed.signature !== QUESTIONS_SIGNATURE) return null;
        if (!Array.isArray(parsed.order) || !parsed.order.length) return null;
        if (typeof parsed.index !== 'number') return null;
        if (!parsed.session || typeof parsed.session.answered !== 'number') return null;
        return parsed;
      } catch {
        return null;
      }
    }

    function clearProgressStorage() {
      localStorage.removeItem(PROGRESS_KEY);
    }

    function applyProgress(progress) {
      state.mode = progress.mode === 'wrong' ? 'wrong' : 'all';
      state.order = progress.order.filter(id => QUESTIONS.some(q => q.id === id));
      state.index = Math.min(Math.max(progress.index || 0, 0), Math.max(state.order.length - 1, 0));
      state.submitted = Boolean(progress.submitted);
      state.session = {
        answered: Number(progress.session?.answered || 0),
        correct: Number(progress.session?.correct || 0),
        wrong: Number(progress.session?.wrong || 0),
      };
      state.currentSelection = new Set(Array.isArray(progress.currentSelection) ? progress.currentSelection : []);
      state.restored = true;
    }

    function resetCurrentProgress() {
      if (!confirm('确定重置当前本轮进度并重新开始吗？')) return;
      buildOrder();
      render();
    }

    function getQuestionById(id) {
      return QUESTIONS.find(q => q.id === id);
    }

    function buildOrder() {
      let pool = [];
      if (state.mode === 'wrong') {
        pool = state.stats.wrongBook
          .map(getQuestionById)
          .filter(Boolean);
      } else {
        pool = [...QUESTIONS];
      }
      state.order = shuffle(pool.map(q => q.id));
      state.index = 0;
      state.submitted = false;
      state.currentSelection = new Set();
      state.session = { answered: 0, correct: 0, wrong: 0 };
      state.restored = false;
      saveProgress();
    }

    function currentQuestion() {
      const id = state.order[state.index];
      return getQuestionById(id);
    }

    function setMode(mode) {
      state.mode = mode;
      buildOrder();
      render();
    }

    function updateTopStats() {
      document.getElementById('statTotal').textContent = QUESTIONS.length;
      document.getElementById('statProgress').textContent = `${state.session.answered} / ${state.order.length}`;
      const acc = state.session.answered ? Math.round(state.session.correct / state.session.answered * 100) : 0;
      document.getElementById('statAccuracy').textContent = `${acc}%`;
      document.getElementById('statWrongBook').textContent = state.stats.wrongBook.length;
      document.getElementById('modePill').textContent = `当前模式：${state.mode === 'all' ? '随机全量' : '错题本'}`;
      document.getElementById('resumePill').textContent = state.restored ? '进度：已恢复上次位置' : '进度：自动保存中';
      document.getElementById('modeAllBtn').classList.toggle('mode-active', state.mode === 'all');
      document.getElementById('modeWrongBtn').classList.toggle('mode-active', state.mode === 'wrong');
      const total = state.order.length || 1;
      const percent = Math.round((state.session.answered / total) * 100);
      document.getElementById('progressFill').style.width = `${percent}%`;
    }

    function toggleSelection(key) {
      const q = currentQuestion();
      if (!q || state.submitted) return;

      if (q.question_type === 'single') {
        state.currentSelection = new Set([key]);
      } else {
        if (state.currentSelection.has(key)) state.currentSelection.delete(key);
        else state.currentSelection.add(key);
      }
      saveProgress();
      render();
    }

    function arrayEqualAsSet(a, b) {
      if (a.length !== b.length) return false;
      const sa = new Set(a);
      const sb = new Set(b);
      if (sa.size !== sb.size) return false;
      for (const x of sa) if (!sb.has(x)) return false;
      return true;
    }

    function recordResult(q, userAnswers, isCorrect) {
      const byId = state.stats.byId;
      if (!byId[q.id]) {
        byId[q.id] = { shown: 0, correct: 0, wrong: 0, last_user_answer: [] };
      }
      byId[q.id].shown += 1;
      byId[q.id].last_user_answer = userAnswers;
      if (isCorrect) byId[q.id].correct += 1;
      else byId[q.id].wrong += 1;

      const wrongSet = new Set(state.stats.wrongBook);
      if (isCorrect) wrongSet.delete(q.id);
      else wrongSet.add(q.id);
      state.stats.wrongBook = [...wrongSet];
      saveStats();
    }

    function submitAnswer() {
      const q = currentQuestion();
      if (!q || state.submitted) return;
      const userAnswers = [...state.currentSelection].sort();
      if (!userAnswers.length) {
        alert('请先选择答案。');
        return;
      }
      const correctAnswers = [...q.answers].sort();
      const isCorrect = arrayEqualAsSet(userAnswers, correctAnswers);
      state.submitted = true;
      state.session.answered += 1;
      if (isCorrect) state.session.correct += 1;
      else state.session.wrong += 1;
      recordResult(q, userAnswers, isCorrect);
      saveProgress();
      render();
    }

    function nextQuestion() {
      if (state.index < state.order.length - 1) {
        state.index += 1;
        state.submitted = false;
        state.currentSelection = new Set();
      } else {
        state.submitted = false;
        state.currentSelection = new Set();
      }
      state.restored = false;
      saveProgress();
      render();
    }

    function resetStats() {
      if (!confirm('确定清空本地统计、错题本和断点进度吗？')) return;
      localStorage.removeItem(STORAGE_KEY);
      clearProgressStorage();
      state.stats = loadStats();
      buildOrder();
      render();
    }

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function renderQuestion() {
      const wrap = document.getElementById('questionWrap');
      updateTopStats();

      if (!state.order.length) {
        wrap.innerHTML = `<div class="empty">${state.mode === 'wrong' ? '错题本目前为空。先去随机全量模式做题。' : '没有可用题目。'}</div>`;
        return;
      }

      const q = currentQuestion();
      if (!q) {
        wrap.innerHTML = `<div class="empty">本轮已结束。你可以重新洗牌，或者切换模式继续刷题。</div>`;
        return;
      }

      const selected = state.currentSelection;
      const inputType = q.question_type === 'single' ? 'radio' : 'checkbox';
      const currentNo = Math.min(state.index + 1, state.order.length);
      const optionsHtml = q.options.map(opt => {
        const isSelected = selected.has(opt.key);
        let extraClass = isSelected ? 'selected' : '';

        if (state.submitted) {
          const isCorrectOption = q.answers.includes(opt.key);
          const isWrongSelected = isSelected && !isCorrectOption;
          if (isCorrectOption) extraClass = 'correct';
          if (isWrongSelected) extraClass = 'incorrect';
        }

        return `
          <label class="option ${extraClass}">
            <input type="${inputType}" name="answer" value="${opt.key}" ${isSelected ? 'checked' : ''} ${state.submitted ? 'disabled' : ''} onchange="toggleSelection('${opt.key}')" />
            <div>
              <div class="opt-key">${opt.key}</div>
              <div class="opt-text">${escapeHtml(opt.text)}</div>
            </div>
          </label>`;
      }).join('');

      const userAnswers = [...selected].sort();
      const isCorrect = arrayEqualAsSet(userAnswers, [...q.answers].sort());
      const resultHtml = state.submitted ? `
        <div class="result show">
          <div class="banner ${isCorrect ? 'ok' : 'bad'}">${isCorrect ? '回答正确' : '回答错误'}｜正确答案：${q.answer_display}</div>
          <div class="small">你的答案：${userAnswers.join('') || '未作答'} ｜ 来源页码：${escapeHtml(q.source || '')}</div>
          <div>
            <div class="small" style="margin-bottom:8px;">英文解析</div>
            <div class="explanation">${escapeHtml(q.explanation_en)}</div>
          </div>
        </div>` : '';

      const submitDisabled = state.submitted ? 'disabled' : '';
      const nextLabel = state.index < state.order.length - 1 ? '下一题' : '本轮结束';
      const typeText = q.question_type === 'single' ? '单选题' : '多选题';

      wrap.innerHTML = `
        <div class="meta">
          <span class="pill">第 ${currentNo} / ${state.order.length} 题</span>
          <span class="pill">${typeText}</span>
          <span class="pill">内部编号：${q.id}</span>
        </div>
        <div class="question-text">${escapeHtml(q.question)}</div>
        <div class="options">${optionsHtml}</div>
        ${resultHtml}
        <div class="footer-actions">
          <button class="primary" onclick="submitAnswer()" ${submitDisabled}>提交答案</button>
          <button onclick="nextQuestion()" ${state.submitted ? '' : 'disabled'}>${nextLabel}</button>
        </div>
      `;
    }

    function render() {
      renderQuestion();
    }

    document.getElementById('modeAllBtn').addEventListener('click', () => setMode('all'));
    document.getElementById('modeWrongBtn').addEventListener('click', () => setMode('wrong'));
    document.getElementById('restartBtn').addEventListener('click', () => { buildOrder(); render(); });
    document.getElementById('resetProgressBtn').addEventListener('click', resetCurrentProgress);
    document.getElementById('resetStatsBtn').addEventListener('click', resetStats);

    const savedProgress = loadProgress();
    if (savedProgress) applyProgress(savedProgress);
    else buildOrder();
    render();
    window.addEventListener('beforeunload', saveProgress);

    window.toggleSelection = toggleSelection;
    window.submitAnswer = submitAnswer;
    window.nextQuestion = nextQuestion;
  </script>
</body>
</html>
